[package]
name = "duckdb_webapi"
version = "0.1.0"
authors = ["Andre Kohn <kohn.a@outlook.com>"]
edition = "2018"
repository = "https://github.com/dashql/duckdb.wasm"
description = "DuckDB WebAPI"
license = "MIT"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
flatbuffers = "0.6"

[build-dependencies]
cmake = "0.1.44"
wasm-bindgen = "0.2"
