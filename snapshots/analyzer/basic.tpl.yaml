analyzer-snapshots:
  # Empty script analysis
  - name: empty
    script:
      input: ''
  # Column refs a, b from A and B in join
  - name: refs_0
    catalog:
      script:
        input: |-
          create table A (a int, b int);
          create table B (d int, e int);
    script:
      input: select * from A, B where a = b;
  # Join edges: a+d=e
  - name: edges_0
    catalog:
      script:
        input: |-
          create table A (a int, b int);
          create table B (d int, e int);
    script:
      input: select * from A, B where a + d = e;
  # Join edges: a=d and b=e
  - name: edges_1
    catalog:
      script:
        input: |-
          create table A (a int, b int);
          create table B (d int, e int);
    script:
      input: select * from A, B where a = d and b = e;
  # Join edges: OR of two AND groups
  - name: edges_2
    catalog:
      script:
        input: |-
          create table A (a int, b int);
          create table B (d int, e int);
    script:
      input: select * from A, B where (a = d and b = e) or (a = d and d = 42);
  # Join edge: a = (d + 42) expression
  - name: edges_3
    catalog:
      script:
        input: |-
          create table A (a int, b int);
          create table B (d int, e int);
    script:
      input: select * from A, B where a = (d + 42);
  # Join edge: INNER JOIN ... ON (a = b)
  - name: edges_4
    catalog:
      script:
        input: |-
          create table A (a int, b int);
          create table B (d int, e int);
    script:
      input: select * from A join B on (a = b);
  # Unresolved table C in FROM
  - name: unresolved_0
    catalog:
      script:
        input: |-
          create table A (a int, b int);
          create table B (d int, e int);
    script:
      input: select * from A, C where a = c;
  # Unresolved column c in WHERE
  - name: unresolved_1
    catalog:
      script:
        input: |-
          create table A (a int, b int);
          create table B (d int, e int);
    script:
      input: select * from A, B where a = c;
  # Unresolved table A with empty catalog
  - name: unresolved_2
    catalog:
      script:
        input: ''
    script:
      input: select * from A;
  # Unresolved columns c, d with empty catalog
  - name: unresolved_3
    catalog:
      script:
        input: ''
    script:
      input: select * from A, B where c = d;
  # Nested subquery: NOT EXISTS with join edge a=d
  - name: nesting_1
    catalog:
      script:
        input: |-
          create table A (a int, b int);
          create table B (d int, e int);
    script:
      input: select * from A where not exists (select * from B where a = d);
  # Nested subquery: NOT EXISTS with A, B and edge a=d
  - name: nesting_2
    catalog:
      script:
        input: |-
          create table A (a int, b int);
          create table B (d int, e int);
    script:
      input: select * from A where not exists (select * from A, B where a = d);
  # Correlated subquery in SELECT list
  - name: nesting_correlated_select
    catalog:
      script:
        input: |-
          create table orders (o_custkey int, o_totalprice decimal);
          create table customer (c_custkey int, c_name text);
    script:
      input: select c_name, (select sum(o_totalprice) from orders where o_custkey = c_custkey) as total from customer;
  # Correlated subquery two levels deep
  - name: nesting_correlated_deep
    catalog:
      script:
        input: |-
          create table A (a int, b int);
          create table B (d int, e int);
          create table C (f int, g int);
    script:
      input: select * from A where exists (select * from B where a = d and exists (select * from C where f = d));
  # Subquery in FROM with output column resolution
  - name: nesting_derived_table
    catalog:
      script:
        input: |-
          create table sales (product text, amount int, region text);
    script:
      input: select product, total from (select product, sum(amount) as total from sales group by product) as s where total > 100;
  # CTE with direct column reference
  - name: cte_basic
    catalog:
      script:
        input: |-
          create table sales (product text, amount int, region text);
    script:
      input: with totals as (select product, sum(amount) as total from sales group by product) select product, total from totals;
  # CTE with renamed output columns
  - name: cte_column_aliases
    catalog:
      script:
        input: |-
          create table sales (product text, amount int, region text);
    script:
      input: with totals(item, revenue) as (select product, sum(amount) from sales group by product) select item, revenue from totals;
  # Multiple CTEs where second references first
  - name: cte_chained
    catalog:
      script:
        input: |-
          create table orders (customer_id int, amount int, status text);
    script:
      input: |-
        with
          completed as (select customer_id, amount from orders where status = 'done'),
          summary as (select customer_id, sum(amount) as total from completed group by customer_id)
        select customer_id, total from summary;
