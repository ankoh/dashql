analyzer-snapshots:

  - name: vis_basic_mark
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
        catalog-id: 1
        tables:
          - catalog-id: "256.65536.4294967296"
            name: sales
            text: "create tab..timestamp)"
            columns:
              - catalog-id: "256.65536.4294967296.0"
                name: category
                text: "category text"
              - catalog-id: "256.65536.4294967296.1"
                name: date
                text: "date timestamp"
              - catalog-id: "256.65536.4294967296.2"
                name: revenue
                text: "revenue int"
        errors: []
    script:
      input: |
        VISUALIZE sales USING vegalite (mark => bar);
      catalog-id: 2
      errors: []
      table-refs:
        - type: name/catalog
          catalog-id: "256.65536.4294967296"
          statement-id: 0
          text: "sales"
      visualizations:
        - statement-id: 0
          source: "sales"
          renderer: vegalite
          vegalite:
            mark: BAR

