formatter-snapshots:
  # Single literal in select list
  - name: select_1
    input: select 1
    dialects:
      duckdb:
  # Multiple literals in select list
  - name: select_1_2
    input: select 1,2
    dialects:
      duckdb:
  # SELECT DISTINCT
  - name: select_distinct
    input: select distinct a, b from t
    dialects:
      duckdb:
        validation:
          setup: |-
            create table t(a int, b int);
