formatter-snapshots:
  # Single literal in select list
  - name: select_1
    input: select 1
    dialects:
      duckdb:
  # Multiple literals in select list
  - name: select_1_2
    input: select 1,2
    dialects:
      duckdb:
  # SELECT DISTINCT
  - name: select_distinct
    input: select distinct a, b from t
    dialects:
      duckdb:
        validation:
          setup: |-
            create table t(a int, b int);

  # WITH / CTE

  - name: select_with_simple
    input: with a as (select 1) select * from a
    dialects:
      duckdb:

  - name: select_with_multiple
    input: with a as (select 1), b as (select 2) select * from a, b
    dialects:
      duckdb:

  - name: select_with_recursive
    input: with recursive t as (select 1 union all select 2) select * from t
    dialects:
      duckdb:
