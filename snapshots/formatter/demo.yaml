formatter-snapshots:

  - name: tpch_q12_like
    input: |-
      select l_shipmode, sum(case when o_orderpriority = '1-URGENT' or o_orderpriority = '2-HIGH' then 1 else 0 end) as high_line_count, sum(case when o_orderpriority <> '1-URGENT' and o_orderpriority <> '2-HIGH' then 1 else 0 end) as low_line_count from orders, lineitem where o_orderkey = l_orderkey and l_shipmode in ('MAIL', 'SHIP') and l_receiptdate >= date '1994-01-01' and l_receiptdate < date '1995-01-01' group by l_shipmode order by l_shipmode
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select l_shipmode, sum(case when o_orderpriority = '1-URGENT' or o_orderpriority = '2-HIGH' then 1 else 0 end) as high_line_count, sum(case when o_orderpriority <> '1-URGENT' and o_orderpriority <> '2-HIGH' then 1 else 0 end) as low_line_count from orders, lineitem where o_orderkey = l_orderkey and l_shipmode in ('MAIL', 'SHIP') and l_receiptdate >= date '1994-01-01' and l_receiptdate < date '1995-01-01' group by l_shipmode order by l_shipmode;
          - mode: compact
            expected: |-
              select l_shipmode,
                sum(case when o_orderpriority = '1-URGENT' or o_orderpriority = '2-HIGH' then 1 else 0 end) as high_line_count,
                sum(case when o_orderpriority <> '1-URGENT' and o_orderpriority <> '2-HIGH' then 1 else 0 end) as low_line_count
              from orders, lineitem
              where o_orderkey = l_orderkey and l_shipmode in ('MAIL', 'SHIP') and l_receiptdate >= date '1994-01-01'
                and l_receiptdate < date '1995-01-01'
              group by l_shipmode
              order by l_shipmode;
          - mode: pretty
            width: 100
            expected: |-
              select l_shipmode,
                sum(
                  case
                    when o_orderpriority = '1-URGENT' or o_orderpriority = '2-HIGH' then 1
                    else 0
                  end
                ) as high_line_count,
                sum(
                  case
                    when o_orderpriority <> '1-URGENT' and o_orderpriority <> '2-HIGH' then 1
                    else 0
                  end
                ) as low_line_count
              from orders, lineitem
              where o_orderkey = l_orderkey
                and l_shipmode in ('MAIL', 'SHIP')
                and l_receiptdate >= date '1994-01-01'
                and l_receiptdate < date '1995-01-01'
              group by l_shipmode
              order by l_shipmode;

  - name: with_cte_query
    input: |-
      with regional_sales as (select region, sum(amount) as total_sales from orders group by region), top_regions as (select region from regional_sales where total_sales > 1000) select region, product, sum(quantity) as units from orders where region in (select region from top_regions) group by region, product
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              with regional_sales as (select region, sum(amount) as total_sales from orders group by region), top_regions as (select region from regional_sales where total_sales > 1000) select region, product, sum(quantity) as units from orders where region in (select region from top_regions) group by region, product;
          - mode: compact
            expected: |-
              with regional_sales as (select region, sum(amount) as total_sales from orders group by region), top_regions as (
                select region from regional_sales where total_sales > 1000
              )
              select region, product, sum(quantity) as units
              from orders
              where region in (select region from top_regions)
              group by region, product;
          - mode: pretty
            width: 100
            expected: |-
              with regional_sales as (
                select region, sum(amount) as total_sales
                from orders
                group by region
              ), top_regions as (
                select region
                from regional_sales
                where total_sales > 1000
              )
              select region, product, sum(quantity) as units
              from orders
              where region in (
                select region
                from top_regions
              )
              group by region, product;

  - name: columnref_simple
    input: |-
      select
          s_acctbal,
          s_name,
          n_name,
          p_partkey,
          p_mfgr,
          s_address,
          s_phone,
          s_comment
      from
          part,
          supplier,
          partsupp,
          nation,
          "Region"
      where
          p_partkey = ps_partkey
          and s_suppkey = ps_suppkey
          and p_size = 15
          and p_type like '%BRASS'
          and s_nationkey = n_nationkey
          and n_regionkey = r_regionkey
          and "r_Name" = 'EUROPE'
          and ps_supplycost = (
              select
                  min(ps_supplycost)
              from
                  partsupp,
                  supplier,
                  nation,
                  "Region"
              where
                  p_partkey = ps_partkey
                  and s_suppkey = ps_suppkey
                  and s_nationkey = n_nationkey
                  and n_regionkey = r_regionkey
                  and "r_Name" = 'EUROPE'
          )
      order by
          s_acctbal desc,
          n_name,
          s_name,
          p_partkey
      limit
      	100
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select s_acctbal, s_name, n_name, p_partkey, p_mfgr, s_address, s_phone, s_comment from part, supplier, partsupp, nation, "Region" where p_partkey = ps_partkey and s_suppkey = ps_suppkey and p_size = 15 and p_type like '%BRASS' and s_nationkey = n_nationkey and n_regionkey = r_regionkey and "r_Name" = 'EUROPE' and ps_supplycost = (select min(ps_supplycost) from partsupp, supplier, nation, "Region" where p_partkey = ps_partkey and s_suppkey = ps_suppkey and s_nationkey = n_nationkey and n_regionkey = r_regionkey and "r_Name" = 'EUROPE') order by s_acctbal desc, n_name, s_name, p_partkey limit 100;
          - mode: compact
            expected: |-
              select s_acctbal, s_name, n_name, p_partkey, p_mfgr, s_address, s_phone, s_comment
              from part, supplier, partsupp, nation, "Region"
              where p_partkey = ps_partkey and s_suppkey = ps_suppkey and p_size = 15 and p_type like '%BRASS'
                and s_nationkey = n_nationkey and n_regionkey = r_regionkey and "r_Name" = 'EUROPE'
                and ps_supplycost = (
                    select min(ps_supplycost)
                    from partsupp, supplier, nation, "Region"
                    where p_partkey = ps_partkey and s_suppkey = ps_suppkey and s_nationkey = n_nationkey
                      and n_regionkey = r_regionkey and "r_Name" = 'EUROPE'
                  )
              order by s_acctbal desc, n_name, s_name, p_partkey
              limit 100;
          - mode: pretty
            expected: |-
              select s_acctbal, s_name, n_name, p_partkey, p_mfgr, s_address, s_phone, s_comment
              from part, supplier, partsupp, nation, "Region"
              where p_partkey = ps_partkey
                and s_suppkey = ps_suppkey
                and p_size = 15
                and p_type like '%BRASS'
                and s_nationkey = n_nationkey
                and n_regionkey = r_regionkey
                and "r_Name" = 'EUROPE'
                and ps_supplycost = (
                    select min(ps_supplycost)
                    from partsupp, supplier, nation, "Region"
                    where p_partkey = ps_partkey
                      and s_suppkey = ps_suppkey
                      and s_nationkey = n_nationkey
                      and n_regionkey = r_regionkey
                      and "r_Name" = 'EUROPE'
                  )
              order by s_acctbal desc, n_name, s_name, p_partkey
              limit 100;
