formatter-snapshots:

  - name: columnref_simple
    input: |-
      select
          s_acctbal,
          s_name,
          n_name,
          p_partkey,
          p_mfgr,
          s_address,
          s_phone,
          s_comment
      from
          part,
          supplier,
          partsupp,
          nation,
          "Region"
      where
          p_partkey = ps_partkey
          and s_suppkey = ps_suppkey
          and p_size = 15
          and p_type like '%BRASS'
          and s_nationkey = n_nationkey
          and n_regionkey = r_regionkey
          and "r_Name" = 'EUROPE'
          and ps_supplycost = (
              select
                  min(ps_supplycost)
              from
                  partsupp,
                  supplier,
                  nation,
                  "Region"
              where
                  p_partkey = ps_partkey
                  and s_suppkey = ps_suppkey
                  and s_nationkey = n_nationkey
                  and n_regionkey = r_regionkey
                  and "r_Name" = 'EUROPE'
          )
      order by
          s_acctbal desc,
          n_name,
          s_name,
          p_partkey
      limit
      	100
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select s_acctbal, s_name, n_name, p_partkey, p_mfgr, s_address, s_phone, s_comment from part, supplier, partsupp, nation, "Region" where p_partkey = ps_partkey and s_suppkey = ps_suppkey and p_size = 15 and p_type like NULL /*LITERAL_STRING*/ and s_nationkey = n_nationkey and n_regionkey = r_regionkey and "r_Name" = NULL /*LITERAL_STRING*/ and ps_supplycost = NULL /*OBJECT_SQL_SELECT_EXPRESSION*/
