formatter-snapshots:

  - name: order_by_single_desc
    input: select a from test order by a desc
    dialects:
      duckdb:
        validation:
          setup: |-
            create table test (a int, b int, c int);

  - name: order_by_single_asc
    input: select a from test order by a asc
    dialects:
      duckdb:
        validation:
          setup: |-
            create table test (a int, b int, c int);

  - name: order_by_nulls_first
    input: select a from test order by a nulls first
    dialects:
      duckdb:
        validation:
          setup: |-
            create table test (a int, b int, c int);

  - name: order_by_nulls_last
    input: select a from test order by a nulls last
    dialects:
      duckdb:
        validation:
          setup: |-
            create table test (a int, b int, c int);

  - name: order_by_desc_nulls_last
    input: select a from test order by a desc nulls last
    dialects:
      duckdb:
        validation:
          setup: |-
            create table test (a int, b int, c int);

  - name: order_by_multiple_items
    input: select a, b, c from test order by a desc, b nulls first, c
    dialects:
      duckdb:
        validation:
          setup: |-
            create table test (a int, b int, c int);

  - name: order_by_long_list_wraps
    input: select a, b, c, d from test order by first_really_long_column_name desc, second_really_long_column_name nulls first, third_really_long_column_name
    dialects:
      duckdb:
        formatted:
          - mode: compact
            width: 70
          - mode: pretty
            width: 70
        validation:
          setup: |-
            create table test (
              a int,
              b int,
              c int,
              d int,
              first_really_long_column_name int,
              second_really_long_column_name int,
              third_really_long_column_name int
            );
