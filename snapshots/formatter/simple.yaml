formatter-snapshots:

  - name: select_1
    input: |-
      select 1
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1
          - mode: compact
            expected: |-
              select 1
          - mode: pretty
            expected: |-
              select 1
        validation:

  - name: select_1_2
    input: |-
      select 1,2
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1, 2
          - mode: compact
            expected: |-
              select 1, 2
          - mode: pretty
            expected: |-
              select 1, 2
        validation:

  - name: select_long_targets_wrap_compact
    input: |-
      select long, list, of, multiple, columns, exceeding, 42, without, line, break
    dialects:
      duckdb:
        formatted:
          - mode: compact
            width: 42
            expected: |-
              select long, list, of, multiple, columns,
                exceeding, 42, without, line, break
        validation:
