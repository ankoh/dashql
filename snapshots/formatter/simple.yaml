formatter-snapshots:

  - name: select_1
    input: |-
      select 1
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1;
          - mode: compact
            expected: |-
              select 1;
          - mode: pretty
            expected: |-
              select 1;

  - name: select_1_2
    input: |-
      select 1,2
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1, 2;
          - mode: compact
            expected: |-
              select 1, 2;
          - mode: pretty
            expected: |-
              select 1, 2;

  - name: select_distinct
    input: |-
      select distinct a, b from t
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select distinct a, b from t;
          - mode: compact
            expected: |-
              select distinct a, b from t;
          - mode: pretty
            expected: |-
              select distinct a, b
              from t;
        validation:
          setup: |-
            create table t(a int, b int);

  - name: select_with_simple
    input: |-
      with a as (select 1) select * from a
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              with a as (select 1) select * from a;
          - mode: compact
            expected: |-
              with a as (select 1) select * from a;
          - mode: pretty
            expected: |-
              with a as (
                select 1
              )
              select *
              from a;

  - name: select_with_multiple
    input: |-
      with a as (select 1), b as (select 2) select * from a, b
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              with a as (select 1), b as (select 2) select * from a, b;
          - mode: compact
            expected: |-
              with a as (select 1), b as (select 2) select * from a, b;
          - mode: pretty
            expected: |-
              with a as (
                select 1
              ), b as (
                select 2
              )
              select *
              from a, b;

  - name: select_with_recursive
    input: |-
      with recursive t as (select 1 union all select 2) select * from t
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              with recursive t as (select 1 union all select 2) select * from t;
          - mode: compact
            expected: |-
              with recursive t as (select 1 union all select 2) select * from t;
          - mode: pretty
            expected: |-
              with recursive t as (
                select 1 union all select 2
              )
              select *
              from t;
