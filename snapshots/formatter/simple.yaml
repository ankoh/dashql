formatter-snapshots:

  - name: select_1
    input: |-
      select 1
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1;
          - mode: compact
            expected: |-
              select 1;
          - mode: pretty
            expected: |-
              select 1;

  - name: select_1_2
    input: |-
      select 1,2
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1, 2;
          - mode: compact
            expected: |-
              select 1, 2;
          - mode: pretty
            expected: |-
              select 1, 2;

  - name: select_distinct
    input: |-
      select distinct a, b from t
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select distinct a, b from t;
          - mode: compact
            expected: |-
              select distinct a, b from t;
          - mode: pretty
            expected: |-
              select distinct a, b
              from t;
        validation:
          setup: |-
            create table t(a int, b int);
