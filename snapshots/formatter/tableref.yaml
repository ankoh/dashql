formatter-snapshots:

  - name: tableref_simple
    input: |-
      select 1 from a
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1 from a;
          - mode: compact
            expected: |-
              select 1 from a;
          - mode: pretty
            expected: |-
              select 1
              from a;
        validation:
          setup: |-
            create table a(x int);

  - name: tableref_schema
    input: |-
      select 1 from a.b
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1 from a.b;
          - mode: compact
            expected: |-
              select 1 from a.b;
          - mode: pretty
            expected: |-
              select 1
              from a.b;
        validation:
          setup: |-
            create schema a;
            create table a.b(a int);

  - name: tableref_database
    input: |-
      select 1 from memory.b.c
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1 from memory.b.c;
          - mode: compact
            expected: |-
              select 1 from memory.b.c;
          - mode: pretty
            expected: |-
              select 1
              from memory.b.c;
        validation:
          setup: |-
            create schema b;
            create table b.c(x int);

