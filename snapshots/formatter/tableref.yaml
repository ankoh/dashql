  - name: tableref_long_schema_1
    input: |-
      select 1 from a.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1 from a.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb;
          - mode: compact
            width: 20
            expected: |-
              select 1
              from a
                .bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb;
          - mode: pretty
            width: 20
            expected: |-
              select 1
