formatter-snapshots:

  - name: group_by_expression
    input: |-
      select a from test group by a
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select a from test group by a;
          - mode: compact
            expected: |-
              select a from test group by a;
          - mode: pretty
            expected: |-
              select a
              from test
              group by a;
        validation:
          setup: |-
            create table test (a int);

  - name: group_by_empty
    input: |-
      select 1 from test group by ()
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1 from test group by ();
          - mode: compact
            expected: |-
              select 1 from test group by ();
          - mode: pretty
            expected: |-
              select 1
              from test
              group by ();

  - name: group_by_cube
    input: |-
      select a from test group by cube(a, b)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select a from test group by cube(a, b);
          - mode: compact
            expected: |-
              select a from test group by cube(a, b);
          - mode: pretty
            expected: |-
              select a
              from test
              group by cube(a, b);

  - name: group_by_rollup
    input: |-
      select a from test group by rollup(a, b)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select a from test group by rollup(a, b);
          - mode: compact
            expected: |-
              select a from test group by rollup(a, b);
          - mode: pretty
            expected: |-
              select a
              from test
              group by rollup(a, b);

  - name: group_by_grouping_sets
    input: |-
      select a from test group by grouping sets(a, b)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select a from test group by grouping sets(a, b);
          - mode: compact
            expected: |-
              select a from test group by grouping sets(a, b);
          - mode: pretty
            expected: |-
              select a
              from test
              group by grouping sets(a, b);

  - name: group_by_multiple
    input: |-
      select a, b, c from test group by a, b, c
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select a, b, c from test group by a, b, c;
          - mode: compact
            expected: |-
              select a, b, c from test group by a, b, c;
          - mode: pretty
            expected: |-
              select a, b, c
              from test
              group by a, b, c;
        validation:
          setup: |-
            create table test (a int, b int, c int);

  - name: group_by_incomplete
    input: |-
      select * from "Region" where "r_Name" = 'EUROPE' group by
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select * from "Region" where "r_Name" = 'EUROPE' group by ;
          - mode: compact
            expected: |-
              select * from "Region" where "r_Name" = 'EUROPE' group by ;
          - mode: pretty
            expected: |-
              select *
              from "Region"
              where "r_Name" = 'EUROPE'
              group by ;
