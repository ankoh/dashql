formatter-snapshots:

  - name: group_by_expression
    input: |-
      select a from test group by a
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select a from test group by a;
          - mode: compact
            expected: |-
              select a from test group by a;
          - mode: pretty
            expected: |-
              select a
              from test
              group by a;
        validation:
          setup: |-
            create table test (a int);

  - name: group_by_empty
    input: |-
      select 1 from test group by ()
    dialects:
      duckdb:
        skip: true

  - name: group_by_cube
    input: |-
      select a from test group by cube(a, b)
    dialects:
      duckdb:
        skip: true

  - name: group_by_rollup
    input: |-
      select a from test group by rollup(a, b)
    dialects:
      duckdb:
        skip: true

  - name: group_by_grouping_sets
    input: |-
      select a from test group by grouping sets(a, b)
    dialects:
      duckdb:
        skip: true
