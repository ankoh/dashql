formatter-snapshots:

  - name: group_by_expression
    input: select a from test group by a
    dialects:
      duckdb:
        validation:
          setup: |-
            create table test (a int);

  - name: group_by_empty
    input: select 1 from test group by ()
    dialects:
      duckdb:

  - name: group_by_cube
    input: select a from test group by cube(a, b)
    dialects:
      duckdb:

  - name: group_by_rollup
    input: select a from test group by rollup(a, b)
    dialects:
      duckdb:

  - name: group_by_grouping_sets
    input: select a from test group by grouping sets(a, b)
    dialects:
      duckdb:

  - name: group_by_multiple
    input: select a, b, c from test group by a, b, c
    dialects:
      duckdb:
        validation:
          setup: |-
            create table test (a int, b int, c int);

  - name: group_by_incomplete
    input: select * from "Region" where "r_Name" = 'EUROPE' group by
    dialects:
      duckdb:
