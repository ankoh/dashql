formatter-snapshots:

  - name: vis_minimal_mark
    input: |-
      visualize using vegalite (mark => line)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize using vegalite (mark => line);
          - mode: compact
            expected: |-
              visualize using vegalite (
                mark => line
              );
          - mode: pretty
            expected: |-
              visualize using vegalite (
                mark => line
              );

  - name: vis_table_source
    input: |-
      visualize sales using vegalite (mark => bar)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize sales using vegalite (mark => bar);
          - mode: compact
            expected: |-
              visualize sales using vegalite (
                mark => bar
              );
          - mode: pretty
            expected: |-
              visualize sales using vegalite (
                mark => bar
              );

  - name: vis_qualified_source
    input: |-
      visualize warehouse.public.sales using vegalite (mark => point)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize warehouse.public.sales using vegalite (mark => point);
          - mode: compact
            expected: |-
              visualize warehouse.public.sales using vegalite (
                mark => point
              );
          - mode: pretty
            expected: |-
              visualize warehouse.public.sales using vegalite (
                mark => point
              );

  - name: vis_select_source
    input: |-
      visualize (select * from sales) using vegalite (mark => line)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize (select * from sales) using vegalite (mark => line);
          - mode: compact
            expected: |-
              visualize (select * from sales) using vegalite (
                mark => line
              );
          - mode: pretty
            expected: |-
              visualize (
                select *
                from sales
              ) using vegalite (
                mark => line
              );

  - name: vis_multi_spec_keys
    input: |-
      visualize sales using vegalite (mark => line, width => 800, height => 400)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize sales using vegalite (mark => line, width => 800, height => 400);
          - mode: compact
            expected: |-
              visualize sales using vegalite (
                mark => line, width => 800, height => 400
              );
          - mode: pretty
            expected: |-
              visualize sales using vegalite (
                mark => line,
                width => 800,
                height => 400
              );

  - name: vis_encoding_simple
    input: |-
      visualize sales using vegalite (mark => bar, encoding => (x => (field => category, type => nominal), y => (field => revenue, type => quantitative)))
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize sales using vegalite (mark => bar, encoding => (x => (field => category, type => nominal), y => (field => revenue, type => quantitative)));
          - mode: compact
            expected: |-
              visualize sales using vegalite (
                mark => bar, encoding => (x => (field => category, type => nominal), y => (field => revenue, type => quantitative))
              );
          - mode: pretty
            expected: |-
              visualize sales using vegalite (
                mark => bar,
                encoding => (
                  x => (
                    field => category,
                    type => nominal
                  ),
                  y => (
                    field => revenue,
                    type => quantitative
                  )
                )
              );

  - name: vis_encoding_narrow
    input: |-
      visualize sales using vegalite (mark => bar, encoding => (x => (field => category, type => nominal), y => (field => revenue, type => quantitative)))
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize sales using vegalite (mark => bar, encoding => (x => (field => category, type => nominal), y => (field => revenue, type => quantitative)));
          - mode: compact
            width: 60
            expected: |-
              visualize sales using vegalite (
                mark => bar,
                encoding => (
                  x => (field => category, type => nominal),
                  y => (field => revenue, type => quantitative)
                )
              );
          - mode: pretty
            expected: |-
              visualize sales using vegalite (
                mark => bar,
                encoding => (
                  x => (
                    field => category,
                    type => nominal
                  ),
                  y => (
                    field => revenue,
                    type => quantitative
                  )
                )
              );

  - name: vis_scale_with_array
    input: |-
      visualize sales using vegalite (encoding => (x => (field => time, type => temporal, scale => (domain => [0, 100]))))
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize sales using vegalite (encoding => (x => (field => time, type => temporal, scale => (domain => [0, 100]))));
          - mode: compact
            expected: |-
              visualize sales using vegalite (
                encoding => (x => (field => time, type => temporal, scale => (domain => [0, 100])))
              );
          - mode: pretty
            expected: |-
              visualize sales using vegalite (
                encoding => (
                  x => (
                    field => time,
                    type => temporal,
                    scale => (
                      domain => [0, 100]
                    )
                  )
                )
              );

  - name: vis_encoding_shorthand
    input: |-
      visualize sales using vegalite (mark => bar, encoding => (x => date, y => revenue))
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize sales using vegalite (mark => bar, encoding => (x => date, y => revenue));
          - mode: compact
            expected: |-
              visualize sales using vegalite (
                mark => bar, encoding => (x => date, y => revenue)
              );
          - mode: pretty
            expected: |-
              visualize sales using vegalite (
                mark => bar,
                encoding => (
                  x => date,
                  y => revenue
                )
              );

  - name: vis_trailing_comma_spec
    input: |-
      visualize sales using vegalite (mark => line, width => 800,)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize sales using vegalite (mark => line, width => 800);
          - mode: compact
            expected: |-
              visualize sales using vegalite (
                mark => line, width => 800
              );
          - mode: pretty
            expected: |-
              visualize sales using vegalite (
                mark => line,
                width => 800
              );

  - name: vis_trailing_comma_nested
    input: |-
      visualize using vegalite (mark => bar, encoding => (x => (field => date, type => temporal,), y => (field => revenue,),),)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize using vegalite (mark => bar, encoding => (x => (field => date, type => temporal), y => (field => revenue)));
          - mode: compact
            expected: |-
              visualize using vegalite (
                mark => bar, encoding => (x => (field => date, type => temporal), y => (field => revenue))
              );
          - mode: pretty
            expected: |-
              visualize using vegalite (
                mark => bar,
                encoding => (
                  x => (
                    field => date,
                    type => temporal
                  ),
                  y => (
                    field => revenue
                  )
                )
              );

  - name: vis_umap_minimal
    input: |-
      visualize embeddings using umap (vector => embedding)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize embeddings using umap (vector => embedding);
          - mode: compact
            expected: |-
              visualize embeddings using umap (
                vector => embedding
              );
          - mode: pretty
            expected: |-
              visualize embeddings using umap (
                vector => embedding
              );

  - name: vis_umap_full
    input: |-
      visualize embeddings using umap (vector => embedding, category => cluster_id, label => name, neighbors => 15, min_dist => 0.1, metric => cosine)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize embeddings using umap (vector => embedding, category => cluster_id, label => name, neighbors => 15, min_dist => 0.1, metric => cosine);
          - mode: compact
            expected: |-
              visualize embeddings using umap (
                vector => embedding, category => cluster_id, label => name, neighbors => 15, min_dist => 0.1, metric => cosine
              );
          - mode: pretty
            expected: |-
              visualize embeddings using umap (
                vector => embedding,
                category => cluster_id,
                label => name,
                neighbors => 15,
                min_dist => 0.1,
                metric => cosine
              );

  - name: vis_full_example
    input: |-
      visualize sales using vegalite (mark => line, encoding => (x => (field => time, type => temporal), y => (field => value, type => quantitative)), width => 800)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              visualize sales using vegalite (mark => line, encoding => (x => (field => time, type => temporal), y => (field => value, type => quantitative)), width => 800);
          - mode: compact
            expected: |-
              visualize sales using vegalite (
                mark => line, encoding => (x => (field => time, type => temporal), y => (field => value, type => quantitative)),
                width => 800
              );
          - mode: pretty
            expected: |-
              visualize sales using vegalite (
                mark => line,
                encoding => (
                  x => (
                    field => time,
                    type => temporal
                  ),
                  y => (
                    field => value,
                    type => quantitative
                  )
                ),
                width => 800
              );
