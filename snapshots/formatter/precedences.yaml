formatter-snapshots:

  - name: prec_plus
    input: |-
      select 1+2
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1 + 2
          - mode: compact
            expected: |-
              select 1 + 2
          - mode: pretty
            expected: |-
              select 1+
              2

  - name: prec_plus_mul_1
    input: |-
      select 1+2*3
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1 + (2 * 3)
          - mode: compact
            expected: |-
              select 1 + (2 * 3)
          - mode: pretty
            expected: |-
              select 1+
              (2*
              3)

  - name: prec_plus_mul_2
    input: |-
      select (1+2)*3
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select (1 + 2) * 3
          - mode: compact
            expected: |-
              select (1 + 2) * 3
          - mode: pretty
            expected: |-
              select (1+
              2)*
              3

  - name: prec_plus_mul_3
    input: |-
      select 1*2+3
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select (1 * 2) + 3
          - mode: compact
            expected: |-
              select (1 * 2) + 3
          - mode: pretty
            expected: |-
              select (1*
              2)+
              3

  - name: prec_and_or_1
    input: |-
      select 1 or 2 and 3
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1 or (2 and 3)
          - mode: compact
            expected: |-
              select 1 or (2 and 3)
          - mode: pretty
            expected: |-
              select 1or
              (2and
              3)

  - name: prec_and_or_2
    input: |-
      select (1 or 2) and 3
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select (1 or 2) and 3
          - mode: compact
            expected: |-
              select (1 or 2) and 3
          - mode: pretty
            expected: |-
              select (1or
              2)and
              3

  - name: prec_minus_left
    input: |-
      select 1-2-3
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select (1 - 2) - 3
          - mode: compact
            expected: |-
              select (1 - 2) - 3
          - mode: pretty
            expected: |-
              select (1-
              2)-
              3

  - name: prec_minus_paren
    input: |-
      select 10-(2-3)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 10 - 2 - 3
          - mode: compact
            expected: |-
              select 10 - 2 - 3
          - mode: pretty
            expected: |-
              select 10-
              2-
              3

  - name: prec_unary_minus_1
    input: |-
      select -1+2
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select (-1) + 2
          - mode: compact
            expected: |-
              select (-1) + 2
          - mode: pretty
            expected: |-
              select (-1)+
              2

  - name: prec_unary_minus_2
    input: |-
