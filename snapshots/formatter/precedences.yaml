  - name: prec_compare_and
    input: |-
      select 1>2 and 3=3
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select (1 > 2) and (3 = 3)
          - mode: compact
            expected: |-
              select (1 > 2) and (3 = 3)
          - mode: pretty
            expected: |-
              select (1>
              2)and
              (3=
