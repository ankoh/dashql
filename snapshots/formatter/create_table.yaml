formatter-snapshots:

  - name: create_table_basic
    input: |-
      create table t (a int, b int)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              create table t (a <OBJECT_SQL_TYPENAME>, b <OBJECT_SQL_TYPENAME>)
          - mode: compact
            expected: |-
              create table t (a <OBJECT_SQL_TYPENAME>, b <OBJECT_SQL_TYPENAME>)
          - mode: pretty
            expected: |-
              create table t (a <OBJECT_SQL_TYPENAME>, b <OBJECT_SQL_TYPENAME>)
        validation:

  - name: create_table_if_not_exists
    input: |-
      create table if not exists schema_1.t_1 (a int)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              create table if not exists schema_1.t_1 (a <OBJECT_SQL_TYPENAME>)
          - mode: compact
            expected: |-
              create table if not exists schema_1.t_1 (a <OBJECT_SQL_TYPENAME>)
          - mode: pretty
            expected: |-
              create table if not exists schema_1.t_1 (a <OBJECT_SQL_TYPENAME>)
        validation:

  - name: create_table_many_elements_long_wrap
    input: |-
      create table t_many (first_really_long_column_name int, second_really_long_column_name int, third_really_long_column_name int, fourth_really_long_column_name int, fifth_really_long_column_name int)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              create table t_many (first_really_long_column_name <OBJECT_SQL_TYPENAME>, second_really_long_column_name <OBJECT_SQL_TYPENAME>, third_really_long_column_name <OBJECT_SQL_TYPENAME>, fourth_really_long_column_name <OBJECT_SQL_TYPENAME>, fifth_really_long_column_name <OBJECT_SQL_TYPENAME>)
          - mode: compact
            width: 70
            expected: |-
              create table t_many (
                first_really_long_column_name <OBJECT_SQL_TYPENAME>,
                second_really_long_column_name <OBJECT_SQL_TYPENAME>,
                third_really_long_column_name <OBJECT_SQL_TYPENAME>,
                fourth_really_long_column_name <OBJECT_SQL_TYPENAME>,
                fifth_really_long_column_name <OBJECT_SQL_TYPENAME>
              )
          - mode: pretty
            width: 70
            expected: |-
              create table t_many (
                first_really_long_column_name <OBJECT_SQL_TYPENAME>,
                second_really_long_column_name <OBJECT_SQL_TYPENAME>,
                third_really_long_column_name <OBJECT_SQL_TYPENAME>,
                fourth_really_long_column_name <OBJECT_SQL_TYPENAME>,
                fifth_really_long_column_name <OBJECT_SQL_TYPENAME>
              )
        validation:

