formatter-snapshots:

  - name: create_table_basic
    input: |-
      create table t (a int, b int)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              create table t (a int, b int)
          - mode: compact
            expected: |-
              create table t (a int, b int)
          - mode: pretty
            expected: |-
              create table t (a int, b int)
        validation:

  - name: create_table_if_not_exists
    input: |-
      create table if not exists schema_1.t_1 (a int)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              create table if not exists schema_1.t_1 (a int)
          - mode: compact
            expected: |-
              create table if not exists schema_1.t_1 (a int)
          - mode: pretty
            expected: |-
              create table if not exists schema_1.t_1 (a int)
        validation:

  - name: create_table_many_elements_wrap
    input: |-
      create table t_many (first_really_long_column_name int, second_really_long_column_name int, third_really_long_column_name int, fourth_really_long_column_name int, fifth_really_long_column_name int)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              create table t_many (first_really_long_column_name int, second_really_long_column_name int, third_really_long_column_name int, fourth_really_long_column_name int, fifth_really_long_column_name int)
          - mode: compact
            width: 70
            expected: |-
              create table t_many (
                first_really_long_column_name int,
                second_really_long_column_name int,
                third_really_long_column_name int,
                fourth_really_long_column_name int,
                fifth_really_long_column_name int
              )
          - mode: pretty
            width: 70
            expected: |-
              create table t_many (
                first_really_long_column_name int,
                second_really_long_column_name int,
                third_really_long_column_name int,
                fourth_really_long_column_name int,
                fifth_really_long_column_name int
              )
        validation:
