formatter-snapshots:

  - name: create_table_basic
    input: |-
      create table t (a int, b int)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              create table t (a integer, b integer);
          - mode: compact
            expected: |-
              create table t (a integer, b integer);
          - mode: pretty
            expected: |-
              create table t (a integer, b integer);

  - name: create_table_if_not_exists
    input: |-
      create table if not exists schema_1.t_1 (a int)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              create table if not exists schema_1.t_1 (a integer);
          - mode: compact
            expected: |-
              create table if not exists schema_1.t_1 (a integer);
          - mode: pretty
            expected: |-
              create table if not exists schema_1.t_1 (a integer);

  - name: create_table_many_elements_long_wrap
    input: |-
      create table t_many (first_really_long_column_name int, second_really_long_column_name int, third_really_long_column_name int, fourth_really_long_column_name int, fifth_really_long_column_name int)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              create table t_many (first_really_long_column_name integer, second_really_long_column_name integer, third_really_long_column_name integer, fourth_really_long_column_name integer, fifth_really_long_column_name integer);
          - mode: compact
            width: 70
            expected: |-
              create table t_many (
                first_really_long_column_name integer,
                second_really_long_column_name integer,
                third_really_long_column_name integer,
                fourth_really_long_column_name integer,
                fifth_really_long_column_name integer
              );
          - mode: pretty
            width: 70
            expected: |-
              create table t_many (
                first_really_long_column_name integer,
                second_really_long_column_name integer,
                third_really_long_column_name integer,
                fourth_really_long_column_name integer,
                fifth_really_long_column_name integer
              );

  - name: create_table_many_elements_short_wrap
    input: |-
      create table t_many (a int, b int, c int, d int, e int, f int, g int, h int, i int, j int)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              create table t_many (a integer, b integer, c integer, d integer, e integer, f integer, g integer, h integer, i integer, j integer);
          - mode: compact
            width: 30
            expected: |-
              create table t_many (
                a integer, b integer,
                c integer, d integer,
                e integer, f integer,
                g integer, h integer,
                i integer, j integer
              );
          - mode: pretty
            width: 30
            expected: |-
              create table t_many (
                a integer,
                b integer,
                c integer,
                d integer,
                e integer,
                f integer,
                g integer,
                h integer,
                i integer,
                j integer
              );

  - name: create_table_with_table_constraints
    input: |-
      create table t (a int, b int, constraint t_pk primary key (a, b), constraint t_u unique (b), constraint t_ck check (a > 0))
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              create table t (a integer, b integer, constraint t_pk primary key (a, b), constraint t_u unique (b), constraint t_ck check (a > 0));
          - mode: compact
            expected: |-
              create table t (
                a integer, b integer, constraint t_pk primary key (a, b), constraint t_u unique (b), constraint t_ck check (a > 0)
              );
          - mode: pretty
            expected: |-
              create table t (
                a integer, b integer, constraint t_pk primary key (a, b), constraint t_u unique (b), constraint t_ck check (a > 0)
              );

  - name: create_table_with_foreign_key_table_constraint
    input: |-
      create table t (ref_id int, constraint t_fk foreign key (ref_id) references ref_t (id) match full on update cascade on delete set null)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              create table t (ref_id integer, constraint t_fk foreign key (ref_id) references ref_t (id) match full on update cascade on delete set null);
          - mode: compact
            expected: |-
              create table t (
                ref_id integer,
                constraint t_fk foreign key (ref_id) references ref_t (id) match full on update cascade on delete set null
              );
          - mode: pretty
            expected: |-
              create table t (
                ref_id integer,
                constraint t_fk foreign key (ref_id) references ref_t (id) match full on update cascade on delete set null
              );
