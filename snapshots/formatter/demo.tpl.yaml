formatter-snapshots:
  - name: tpch_q12_like
    input: |
      select l_shipmode, sum(case when o_orderpriority = '1-URGENT' or o_orderpriority = '2-HIGH' then 1 else 0 end) as high_line_count, sum(case when o_orderpriority <> '1-URGENT' and o_orderpriority <> '2-HIGH' then 1 else 0 end) as low_line_count from orders, lineitem where o_orderkey = l_orderkey and l_shipmode in ('MAIL', 'SHIP') and l_receiptdate >= date '1994-01-01' and l_receiptdate < date '1995-01-01' group by l_shipmode order by l_shipmode
    dialects:
      duckdb:
        formatted:
          - mode: pretty
            width: 100

  - name: with_cte_query
    input: |
      with regional_sales as (select region, sum(amount) as total_sales from orders group by region), top_regions as (select region from regional_sales where total_sales > 1000) select region, product, sum(quantity) as units from orders where region in (select region from top_regions) group by region, product
    dialects:
      duckdb:
        formatted:
          - mode: pretty
            width: 100

  - name: tpch_q1
    input: |
      select l_returnflag, l_linestatus, sum(l_quantity) as sum_qty, sum(l_extendedprice) as sum_base_price, sum(l_extendedprice * (1 - l_discount)) as sum_disc_price, sum(l_extendedprice * (1 - l_discount) * (1 + l_tax)) as sum_charge, avg(l_quantity) as avg_qty, avg(l_extendedprice) as avg_price, avg(l_discount) as avg_disc, count(*) as count_order from lineitem where l_shipdate <= date '1998-12-01' - interval '90' day group by l_returnflag, l_linestatus order by l_returnflag, l_linestatus
    dialects:
      duckdb:
        formatted:
          - mode: pretty
            width: 100

  - name: columnref_simple
    input: |
      select
          s_acctbal,
          s_name,
          n_name,
          p_partkey,
          p_mfgr,
          s_address,
          s_phone,
          s_comment
      from
          part,
          supplier,
          partsupp,
          nation,
          "Region"
      where
          p_partkey = ps_partkey
          and s_suppkey = ps_suppkey
          and p_size = 15
          and p_type like '%BRASS'
          and s_nationkey = n_nationkey
          and n_regionkey = r_regionkey
          and "r_Name" = 'EUROPE'
          and ps_supplycost = (
              select
                  min(ps_supplycost)
              from
                  partsupp,
                  supplier,
                  nation,
                  "Region"
              where
                  p_partkey = ps_partkey
                  and s_suppkey = ps_suppkey
                  and s_nationkey = n_nationkey
                  and n_regionkey = r_regionkey
                  and "r_Name" = 'EUROPE'
          )
      order by
          s_acctbal desc,
          n_name,
          s_name,
          p_partkey
      limit
      	100
    dialects:
      duckdb:


