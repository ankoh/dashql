formatter-snapshots:

  - name: func_cast_int
    input: |-
      select cast(x as integer)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select cast(x as integer);
          - mode: compact
            expected: |-
              select cast(x as integer);
          - mode: pretty
            expected: |-
              select cast(x as integer);

  - name: func_cast_varchar
    input: |-
      select cast(123 as varchar)
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select cast(123 as varchar);
          - mode: compact
            expected: |-
              select cast(123 as varchar);
          - mode: pretty
            expected: |-
              select cast(123 as varchar);

  - name: func_cast_timestamp
    input: |-
      select cast('2021-01-01' as timestamp)
    dialects:
