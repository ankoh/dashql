formatter-snapshots:

  # CAST

  - name: func_cast_int
    input: select cast(x as integer)
    dialects:
      duckdb:

  - name: func_cast_varchar
    input: select cast(123 as varchar)
    dialects:
      duckdb:

  - name: func_cast_timestamp
    input: select cast('2021-01-01' as timestamp)
    dialects:
      duckdb:

  - name: func_cast_timestamp_tz
    input: select cast('2021-01-01' as timestamp with time zone)
    dialects:
      duckdb:

  # EXTRACT

  - name: func_extract_year
    input: select extract(year from d)
    dialects:
      duckdb:

  - name: func_extract_day
    input: select extract(day from created_at)
    dialects:
      duckdb:

  # POSITION

  - name: func_position
    input: select position('x' in name)
    dialects:
      duckdb:

  # SUBSTRING

  - name: func_substring_from
    input: select substring(name from 1)
    dialects:
      duckdb:

  - name: func_substring_from_for
    input: select substring(name from 1 for 3)
    dialects:
      duckdb:

  # TRIM

  - name: func_trim_both
    input: select trim(both ' ' from name)
    dialects:
      duckdb:

  - name: func_trim_leading
    input: select trim(leading from name)
    dialects:
      duckdb:

  - name: func_trim_simple
    input: select trim(name)
    dialects:
      duckdb:

  # Window functions

  - name: func_over_partition
    input: select sum(x) over (partition by y)
    dialects:
      duckdb:

  - name: func_over_order
    input: select row_number() over (order by x)
    dialects:
      duckdb:

  - name: func_over_partition_order
    input: select rank() over (partition by a order by b)
    dialects:
      duckdb:

  - name: func_over_empty
    input: select count(*) over ()
    dialects:
      duckdb:

  - name: func_filter
    input: select count(*) filter (where x > 0)
    dialects:
      duckdb:

  - name: func_within_group
    input: select percentile_cont(0.5) within group (order by x)
    dialects:
      duckdb:
