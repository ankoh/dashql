formatter-snapshots:

  - name: expr_plus
    input: |-
      select 1+2
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select 1 + 2;
          - mode: compact
            expected: |-
              select 1 + 2;
          - mode: pretty
            expected: |-
              select 1 + 2;

