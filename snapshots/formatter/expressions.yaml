  - name: expr_nested_boolean_chain_long
    input: |-
      select * from test where very_long_outer_left_column = 1 and (very_long_inner_left_column = 2 or very_long_inner_middle_column = 3 or very_long_inner_right_column = 4) and very_long_outer_right_column = 5
    dialects:
      duckdb:
        formatted:
          - mode: inline
            expected: |-
              select <BOOL> from test where very_long_outer_left_column = 1 and (very_long_inner_left_column = 2 or very_long_inner_middle_column = 3 or very_long_inner_right_column = 4) and very_long_outer_right_column = 5;
          - mode: compact
            width: 80
            expected: |-
              select <BOOL>
              from test
              where very_long_outer_left_column = 1
                and (very_long_inner_left_column = 2 or very_long_inner_middle_column = 3
                    or very_long_inner_right_column = 4)
                and very_long_outer_right_column = 5;
          - mode: pretty
            width: 80
            expected: |-
              select <BOOL>
              from test
              where very_long_outer_left_column = 1
                and (
                  very_long_inner_left_column = 2
                    or very_long_inner_middle_column = 3
                    or very_long_inner_right_column = 4
                )
                and very_long_outer_right_column = 5;
