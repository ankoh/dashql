formatter-snapshots:
  - name: tableref_simple
    input: select 1 from a
    dialects:
      duckdb:
        validation:
          setup: |-
            create table a(x int);

  - name: tableref_schema
    input: select 1 from a.b
    dialects:
      duckdb:
        validation:
          setup: |-
            create schema a;
            create table a.b(a int);

  - name: tableref_database
    input: select 1 from memory.b.c
    dialects:
      duckdb:
        validation:
          setup: |-
            create schema b;
            create table b.c(x int);

  - name: tableref_long_simple
    input: select 1 from aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    dialects:
      duckdb:
        validation:
          setup: |-
            create table aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa(x int);

  - name: tableref_long_schema_1
    input: select 1 from a.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    dialects:
      duckdb:
        formatted:
        - mode: compact
          width: 20
        - mode: pretty
          width: 20
        validation:
          setup: |-
            create schema a;
            create table a.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb(x int);

  - name: tableref_long_schema_2
    input: select 1 from aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    dialects:
      duckdb:
        formatted:
        - mode: compact
          width: 20
        - mode: pretty
          width: 20
        validation:
          setup: |-
            create schema aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa;
            create table aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb(x int);

  - name: tableref_long_database_1
    input: select 1 from memory.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb.cccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
    dialects:
      duckdb:
        formatted:
        - mode: compact
          width: 20
        - mode: pretty
          width: 20
        validation:
          setup: |-
            create schema memory.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb;
            create table memory.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb.cccccccccccccccccccccccccccccccccccccccccccccccccccccccccc(x int);
