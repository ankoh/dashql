formatter-snapshots:
  - name: tableref_simple
    input: select 1 from a
    dialects:
      duckdb:
        validation:
          setup: |-
            create table a(x int);

  - name: tableref_schema
    input: select 1 from a.b
    dialects:
      duckdb:
        validation:
          setup: |-
            create schema a;
            create table a.b(a int);

  - name: tableref_database
    input: select 1 from memory.b.c
    dialects:
      duckdb:
        validation:
          setup: |-
            create schema b;
            create table b.c(x int);

  - name: tableref_alias
    input: select 1 from a t
    dialects:
      duckdb:
        validation:
          setup: |-
            create table a(x int);

  - name: tableref_alias_schema
    input: select 1 from a.b t
    dialects:
      duckdb:
        validation:
          setup: |-
            create schema a;
            create table a.b(x int);

  - name: tableref_long_simple
    input: select 1 from aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    dialects:
      duckdb:
        validation:
          setup: |-
            create table aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa(x int);

  - name: tableref_long_schema_1
    input: select 1 from a.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    dialects:
      duckdb:
        formatted:
        - mode: compact
          width: 20
        - mode: pretty
          width: 20
        validation:
          setup: |-
            create schema a;
            create table a.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb(x int);

  - name: tableref_long_schema_2
    input: select 1 from aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    dialects:
      duckdb:
        formatted:
        - mode: compact
          width: 20
        - mode: pretty
          width: 20
        validation:
          setup: |-
            create schema aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa;
            create table aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb(x int);

  - name: tableref_join_inner
    input: select * from a join b on a.x = b.x
    dialects:
      duckdb:
        validation:
          setup: |-
            create table a(x int);
            create table b(x int);

  - name: tableref_join_left
    input: select * from a left join b on a.x = b.x
    dialects:
      duckdb:
        validation:
          setup: |-
            create table a(x int);
            create table b(x int);

  - name: tableref_join_right
    input: select * from a right join b on a.x = b.x
    dialects:
      duckdb:
        validation:
          setup: |-
            create table a(x int);
            create table b(x int);

  - name: tableref_join_full
    input: select * from a full join b on a.x = b.x
    dialects:
      duckdb:
        validation:
          setup: |-
            create table a(x int);
            create table b(x int);

  - name: tableref_join_using
    input: select * from a join b using (x)
    dialects:
      duckdb:
        validation:
          setup: |-
            create table a(x int);
            create table b(x int);

  - name: tableref_join_alias
    input: select * from a t1 join b t2 on t1.x = t2.x
    dialects:
      duckdb:
        validation:
          setup: |-
            create table a(x int);
            create table b(x int);

  - name: tableref_function_table
    input: select * from generate_series(1, 10) t(x)
    dialects:
      duckdb:

  - name: tableref_function_table_no_alias
    input: select * from generate_series(1, 10)
    dialects:
      duckdb:

  - name: tableref_function_table_ordinality
    input: select * from generate_series(1, 10) with ordinality t(x, n)
    dialects:
      duckdb:

  - name: tableref_lateral_function
    input: select * from a, lateral generate_series(1, a.n) t(x)
    dialects:
      duckdb:
        validation:
          setup: |-
            create table a(n int);

  - name: tableref_long_database_1
    input: select 1 from memory.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb.cccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
    dialects:
      duckdb:
        formatted:
        - mode: compact
          width: 20
        - mode: pretty
          width: 20
        validation:
          setup: |-
            create schema memory.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb;
            create table memory.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb.cccccccccccccccccccccccccccccccccccccccccccccccccccccccccc(x int);
