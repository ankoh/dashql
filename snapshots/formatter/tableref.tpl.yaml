formatter-snapshots:
  - name: tableref_simple
    input: select 1 from a
    dialects:
      duckdb:
        formatted:
        - mode: compact
        validation:
          setup: |-
            create table a(x int);

  - name: tableref_schema
    input: select 1 from a.b
    dialects:
      duckdb:
        formatted:
        - mode: compact

  - name: tableref_database
    input: select 1 from a.b.c
    dialects:
      duckdb:
        formatted:
        - mode: compact

  - name: tableref_long_simple
    input: select 1 from aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    dialects:
      duckdb:
        formatted:
        - mode: compact

  - name: tableref_long_schema_1
    input: select 1 from a.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    dialects:
      duckdb:
        formatted:
        - mode: compact
          width: 20
        - mode: pretty
          width: 20

  - name: tableref_long_schema_2
    input: select 1 from aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    dialects:
      duckdb:
        formatted:
        - mode: compact
          width: 20
        - mode: pretty
          width: 20

  - name: tableref_long_database_1
    input: select 1 from aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb.cccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
    dialects:
      duckdb:
        formatted:
        - mode: compact
          width: 20
        - mode: pretty
          width: 20
