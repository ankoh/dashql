parser-snapshots:

  - name: error_reporting_0
    input: |-
      select * from foo select
    expected:
      statements: []
      scanner-errors: []
      parser-errors:
        - message: 'syntax error, unexpected SELECT'
          text: "select"
      line-breaks: []
      comments: []

  - name: error_reporting_sconst_in_from
    input: |-
      select * from 'foo'
    expected:
      statements: []
      scanner-errors: []
      parser-errors:
        - message: 'syntax error, unexpected string literal'
          text: "'foo'"
          hint: string literals cannot be used as identifiers here; use a double-quoted identifier instead
      line-breaks: []
      comments: []

  - name: error_reporting_sconst_as_implicit_alias
    input: |-
      select 1 'one'
    expected:
      statements: []
      scanner-errors: []
      parser-errors:
        - message: 'syntax error, unexpected string literal'
          text: "'one'"
          hint: string literals cannot be used as identifiers here; use a double-quoted identifier instead
      line-breaks: []
      comments: []

  - name: error_reporting_sconst_explicit_alias_ok
    input: |-
      select 1 as 'one'
    expected:
      statements:
        - type: SELECT
          ast-begin: 0
          ast-size: 5
          ast:
            type: OBJECT_SQL_SELECT
            text: "select 1 as 'one'"
            children:
              - key: SQL_SELECT_TARGETS
                type: ARRAY
                text: "1 as 'one'"
                children:
                  - type: OBJECT_SQL_RESULT_TARGET
                    text: "1 as 'one'"
                    children:
                      - key: SQL_RESULT_TARGET_VALUE
                        type: LITERAL_INTEGER
                        text: "1"
                      - key: SQL_RESULT_TARGET_NAME
                        type: NAME
                        text: "'one'"
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []

  - name: error_reporting_vis_unknown_renderer
    input: |-
      visualize sales using foo (mark => bar)
    expected:
      statements: []
      scanner-errors: []
      parser-errors:
        - message: 'syntax error, unexpected identifier literal, expecting VEGALITE'
          text: "foo"
      line-breaks: []
      comments: []
