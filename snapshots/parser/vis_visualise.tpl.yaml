parser-snapshots:
  # Minimal empty VISUALISE statement
  - name: vis_visualise_empty
    input: |
      VISUALISE;
  - name: vis_visualize_empty
    input: |
      VISUALIZE;
  # Existing SELECT using VISUALISE keywords as identifiers still parses
  - name: keyword_collision_select
    input: |
      SELECT visualise, draw, scale FROM t;

  # VISUALISE (SELECT ...) — global pipeline
  - name: vis_visualise_select
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW point;
  - name: vis_visualise_select_targets
    input: |
      VISUALISE (SELECT date AS x, revenue AS y FROM sales)
        DRAW line;

  # VISUALISE TABLE <name> — shorthand for VISUALISE (SELECT * FROM <name>)
  - name: vis_visualise_table
    input: |
      VISUALISE TABLE sales
        DRAW point;
  - name: vis_visualise_table_qualified
    input: |
      VISUALISE TABLE warehouse.public.sales
        DRAW line;

  # DRAW
  - name: vis_draw_point_basic
    input: |
      VISUALISE
        DRAW point;
  - name: vis_draw_with_select
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW line FROM (SELECT date AS x, revenue AS y);
  - name: vis_draw_with_where
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW bar FROM (SELECT region AS x, revenue AS y WHERE revenue > 100);
  - name: vis_draw_order_by
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW line FROM (SELECT date AS x, revenue AS y ORDER BY date ASC);
  - name: vis_draw_using
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW bar FROM (SELECT region AS x, revenue AS y)
        USING (size => 10, fill => 'blue');
  - name: vis_draw_col_alias
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW col FROM (SELECT date AS x, revenue AS y);
  - name: vis_draw_full
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW line FROM (
          SELECT date AS x, revenue AS y
          WHERE region = 'EU'
          ORDER BY date ASC
        )
        USING (size => 2);
  - name: vis_draw_with_from
    input: |
      VISUALISE
        DRAW line FROM (SELECT date AS x, revenue AS y FROM sales);
  - name: vis_draw_two_layers
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW line FROM (SELECT date AS x, revenue AS y)
        DRAW point FROM (SELECT date AS x, revenue AS y) USING (size => 4);
  - name: vis_draw_partition_by
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW line FROM (SELECT date AS x, revenue AS y ORDER BY date ASC)
        PARTITION BY region;
  - name: vis_draw_partition_by_multi
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW line FROM (SELECT date AS x, revenue AS y)
        PARTITION BY region, fiscal_year
        USING (size => 2);

  # SCALE
  - name: vis_scale_aesthetic_only
    input: |
      VISUALISE
        SCALE x;
  - name: vis_scale_continuous
    input: |
      VISUALISE
        SCALE continuous x;
  - name: vis_scale_discrete_from_to
    input: |
      VISUALISE
        SCALE discrete color FROM [1, 2, 3] TO [10, 20, 30];
  - name: vis_scale_continuous_from_only
    input: |
      VISUALISE
        SCALE continuous x FROM [0, 100];
  - name: vis_scale_continuous_to_only
    input: |
      VISUALISE
        SCALE continuous y TO [0, 500];
  - name: vis_scale_binned_using
    input: |
      VISUALISE
        SCALE binned y
        USING (palette => 'viridis');
  - name: vis_scale_ordinal
    input: |
      VISUALISE
        SCALE ordinal fill;
  - name: vis_scale_identity
    input: |
      VISUALISE
        SCALE identity size;
  - name: vis_scale_format_lambda
    input: |
      VISUALISE
        SCALE discrete color
        FORMAT (lambda x: case x when 1 then 'foo' when 2 then 'bar' end);
  - name: vis_scale_projection
    input: |
      VISUALISE
        SCALE continuous(lambda v: log10(v)) x;
  - name: vis_scale_type_options
    input: |
      VISUALISE
        SCALE binned(breaks => 10) y;
  - name: vis_scale_projection_and_type_options
    input: |
      VISUALISE
        SCALE continuous(lambda v: log10(v), breaks => log10) x;
  - name: vis_scale_named_projection
    input: |
      VISUALISE
        SCALE continuous(value => lambda v: log10(v), breaks => log10) x;
  - name: vis_scale_full
    input: |
      VISUALISE
        SCALE continuous(lambda v: log10(v), breaks => log10) x
        FROM [0, 100] TO [0, 1000]
        USING (labels => 'scientific')
        FORMAT (lambda v: v * 2);

  # FACET
  - name: vis_facet_rows
    input: |
      VISUALISE
        FACET region;
  - name: vis_facet_rows_by_cols
    input: |
      VISUALISE
        FACET region BY fiscal_year;
  - name: vis_facet_using
    input: |
      VISUALISE
        FACET region
        USING (scales => 'free');

  # PROJECT
  - name: vis_project_to_type
    input: |
      VISUALISE
        PROJECT TO polar;
  - name: vis_project_aesthetics
    input: |
      VISUALISE
        PROJECT x, y TO cartesian;
  - name: vis_project_using
    input: |
      VISUALISE
        PROJECT TO map
        USING (center => 'Europe');

  # LABEL
  - name: vis_label_using
    input: |
      VISUALISE
        LABEL USING (title => 'Sales by Region', subtitle => 'FY2026');

  # DRAW ... REMAP
  - name: vis_draw_remap_single
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW histogram FROM (SELECT price AS x)
        REMAP (count AS y);
  - name: vis_draw_remap_multi
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW histogram FROM (SELECT price AS x)
        REMAP (count AS y, count AS fill);
  - name: vis_draw_remap_with_using
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW histogram FROM (SELECT price AS x)
        REMAP (density AS y)
        USING (binwidth => 5);

  # Composed pipeline
  - name: vis_full_pipeline
    input: |
      VISUALISE (SELECT * FROM sales)
        DRAW point FROM (SELECT date AS x, revenue AS y)
        SCALE continuous y FROM [0] TO [1000]
        FACET region BY fiscal_year
        PROJECT TO cartesian
        LABEL USING (title => 'Sales');
