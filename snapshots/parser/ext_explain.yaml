parser-snapshots:

  - name: explain_select
    input: |-
      explain select 1
    expected:
      statements:
        - type: EXPLAIN
          ast-begin: 0
          ast-size: 5
          ast:
            type: OBJECT_EXT_EXPLAIN
            text: "explain select 1"
            children:
              - key: EXT_EXPLAIN_STATEMENT
                type: OBJECT_SQL_SELECT
                text: "select 1"
                children:
                  - key: SQL_SELECT_TARGETS
                    type: ARRAY
                    text: "1"
                    children:
                      - type: OBJECT_SQL_RESULT_TARGET
                        text: "1"
                        children:
                          - key: SQL_RESULT_TARGET_VALUE
                            type: LITERAL_INTEGER
                            text: "1"
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []

  - name: explain_with_analyze
    input: |-
      explain (analyze) select 1
    expected:
      statements:
        - type: EXPLAIN
          ast-begin: 0
          ast-size: 8
          ast:
            type: OBJECT_EXT_EXPLAIN
            text: "explain (a..) select 1"
            children:
              - key: EXT_EXPLAIN_STATEMENT
                type: OBJECT_SQL_SELECT
                text: "select 1"
                children:
                  - key: SQL_SELECT_TARGETS
                    type: ARRAY
                    text: "1"
                    children:
                      - type: OBJECT_SQL_RESULT_TARGET
                        text: "1"
                        children:
                          - key: SQL_RESULT_TARGET_VALUE
                            type: LITERAL_INTEGER
                            text: "1"
              - key: EXT_EXPLAIN_OPTIONS
                type: ARRAY
                text: "(analyze)"
                children:
                  - type: OBJECT_SQL_GENERIC_OPTION
                    text: "analyze"
                    children:
                      - key: SQL_GENERIC_OPTION_KEY
                        type: NAME
                        text: "analyze"
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []

  - name: explain_with_options
    input: |-
      explain (analyze, format text) select 1
    expected:
      statements:
        - type: EXPLAIN
          ast-begin: 0
          ast-size: 11
          ast:
            type: OBJECT_EXT_EXPLAIN
            text: "explain (a..) select 1"
            children:
              - key: EXT_EXPLAIN_STATEMENT
                type: OBJECT_SQL_SELECT
                text: "select 1"
                children:
                  - key: SQL_SELECT_TARGETS
                    type: ARRAY
                    text: "1"
                    children:
                      - type: OBJECT_SQL_RESULT_TARGET
                        text: "1"
                        children:
                          - key: SQL_RESULT_TARGET_VALUE
                            type: LITERAL_INTEGER
                            text: "1"
              - key: EXT_EXPLAIN_OPTIONS
                type: ARRAY
                text: "(analyze, ..rmat text)"
                children:
                  - type: OBJECT_SQL_GENERIC_OPTION
                    text: "analyze"
                    children:
                      - key: SQL_GENERIC_OPTION_KEY
                        type: NAME
                        text: "analyze"
                  - type: OBJECT_SQL_GENERIC_OPTION
                    text: "format text"
                    children:
                      - key: SQL_GENERIC_OPTION_KEY
                        type: NAME
                        text: "format"
                      - key: SQL_GENERIC_OPTION_VALUE
                        type: NAME
                        text: "text"
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []

  - name: explain_with_bool_option
    input: |-
      explain (analyze true, verbose false) select 1
    expected:
      statements:
        - type: EXPLAIN
          ast-begin: 0
          ast-size: 12
          ast:
            type: OBJECT_EXT_EXPLAIN
            text: "explain (a..) select 1"
            children:
              - key: EXT_EXPLAIN_STATEMENT
                type: OBJECT_SQL_SELECT
                text: "select 1"
                children:
                  - key: SQL_SELECT_TARGETS
                    type: ARRAY
                    text: "1"
                    children:
                      - type: OBJECT_SQL_RESULT_TARGET
                        text: "1"
                        children:
                          - key: SQL_RESULT_TARGET_VALUE
                            type: LITERAL_INTEGER
                            text: "1"
              - key: EXT_EXPLAIN_OPTIONS
                type: ARRAY
                text: "(analyze t..ose false)"
                children:
                  - type: OBJECT_SQL_GENERIC_OPTION
                    text: "analyze true"
                    children:
                      - key: SQL_GENERIC_OPTION_KEY
                        type: NAME
                        text: "analyze"
                      - key: SQL_GENERIC_OPTION_VALUE
                        type: BOOL
                        value: 1
                  - type: OBJECT_SQL_GENERIC_OPTION
                    text: "verbose false"
                    children:
                      - key: SQL_GENERIC_OPTION_KEY
                        type: NAME
                        text: "verbose"
                      - key: SQL_GENERIC_OPTION_VALUE
                        type: BOOL
                        value: 0
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []

  - name: explain_create_table
    input: |-
      explain create table foo (id integer)
    expected:
      statements:
        - type: EXPLAIN
          ast-begin: 0
          ast-size: 9
          ast:
            type: OBJECT_EXT_EXPLAIN
            text: "explain cr..d integer)"
            children:
              - key: EXT_EXPLAIN_STATEMENT
                type: OBJECT_SQL_CREATE
                text: "create tab..d integer)"
                children:
                  - key: SQL_CREATE_TABLE_NAME
                    type: ARRAY
                    text: "foo"
                    children:
                      - type: NAME
                        text: "foo"
                  - key: SQL_CREATE_TABLE_ELEMENTS
                    type: ARRAY
                    text: "(id integer)"
                    children:
                      - type: OBJECT_SQL_COLUMN_DEF
                        text: "id integer"
                        children:
                          - key: SQL_COLUMN_DEF_NAME
                            type: NAME
                            text: "id"
                          - key: SQL_COLUMN_DEF_TYPE
                            type: OBJECT_SQL_TYPENAME
                            text: "integer"
                            children:
                              - key: SQL_TYPENAME_TYPE
                                type: ENUM_SQL_NUMERIC_TYPE
                                value: INT4
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []

  - name: explain_select_from
    input: |-
      explain select a, b from t where a > 1
    expected:
      statements:
        - type: EXPLAIN
          ast-begin: 0
          ast-size: 22
          ast:
            type: OBJECT_EXT_EXPLAIN
            text: "explain se..here a > 1"
            children:
              - key: EXT_EXPLAIN_STATEMENT
                type: OBJECT_SQL_SELECT
                text: "select a, ..here a > 1"
                children:
                  - key: SQL_SELECT_TARGETS
                    type: ARRAY
                    text: "a, b"
                    children:
                      - type: OBJECT_SQL_RESULT_TARGET
                        text: "a"
                        children:
                          - key: SQL_RESULT_TARGET_VALUE
                            type: OBJECT_SQL_COLUMN_REF
                            text: "a"
                            children:
                              - key: SQL_COLUMN_REF_PATH
                                type: ARRAY
                                text: "a"
                                children:
                                  - type: NAME
                                    text: "a"
                      - type: OBJECT_SQL_RESULT_TARGET
                        text: "b"
                        children:
                          - key: SQL_RESULT_TARGET_VALUE
                            type: OBJECT_SQL_COLUMN_REF
                            text: "b"
                            children:
                              - key: SQL_COLUMN_REF_PATH
                                type: ARRAY
                                text: "b"
                                children:
                                  - type: NAME
                                    text: "b"
                  - key: SQL_SELECT_FROM
                    type: ARRAY
                    text: "from t"
                    children:
                      - type: OBJECT_SQL_TABLEREF
                        text: "t"
                        children:
                          - key: SQL_TABLEREF_NAME
                            type: ARRAY
                            text: "t"
                            children:
                              - type: NAME
                                text: "t"
                  - key: SQL_SELECT_WHERE
                    type: OBJECT_SQL_NARY_EXPRESSION
                    text: "a > 1"
                    children:
                      - key: SQL_EXPRESSION_OPERATOR
                        type: ENUM_SQL_EXPRESSION_OPERATOR
                        value: GREATER_THAN
                      - key: SQL_EXPRESSION_ARGS
                        type: ARRAY
                        text: "a > 1"
                        children:
                          - type: OBJECT_SQL_COLUMN_REF
                            text: "a"
                            children:
                              - key: SQL_COLUMN_REF_PATH
                                type: ARRAY
                                text: "a"
                                children:
                                  - type: NAME
                                    text: "a"
                          - type: LITERAL_INTEGER
                            text: "1"
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []
