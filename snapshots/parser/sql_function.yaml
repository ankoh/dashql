parser-snapshots:

  - name: create_function_basic
    input: |-
      create function foo(a int, b varchar) returns varchar
    expected:
      statements:
        - type: CREATE_FUNCTION
          ast-begin: 0
          ast-size: 16
          ast:
            type: OBJECT_SQL_CREATE_FUNCTION
            text: "create fun..ns varchar"
            children:
              - key: SQL_CREATE_FUNCTION_NAME
                type: ARRAY
                text: "foo"
                children:
                  - type: NAME
                    text: "foo"
              - key: SQL_CREATE_FUNCTION_PARAMS
                type: ARRAY
                text: "(a int, b varchar)"
                children:
                  - type: OBJECT_SQL_FUNCTION_PARAM
                    text: "a int"
                    children:
                      - key: SQL_FUNCTION_PARAM_NAME
                        type: NAME
                        text: "a"
                      - key: SQL_FUNCTION_PARAM_TYPE
                        type: OBJECT_SQL_TYPENAME
                        text: "int"
                        children:
                          - key: SQL_TYPENAME_TYPE
                            type: ENUM_SQL_NUMERIC_TYPE
                            value: INT4
                  - type: OBJECT_SQL_FUNCTION_PARAM
                    text: "b varchar"
                    children:
                      - key: SQL_FUNCTION_PARAM_NAME
                        type: NAME
                        text: "b"
                      - key: SQL_FUNCTION_PARAM_TYPE
                        type: OBJECT_SQL_TYPENAME
                        text: "varchar"
                        children:
                          - key: SQL_TYPENAME_TYPE
                            type: OBJECT_SQL_CHARACTER_TYPE
                            text: "varchar"
                            children:
                              - key: SQL_CHARACTER_TYPE
                                type: ENUM_SQL_CHARACTER_TYPE
                                value: VARCHAR
              - key: SQL_CREATE_FUNCTION_RETURNS
                type: OBJECT_SQL_TYPENAME
                text: "varchar"
                children:
                  - key: SQL_TYPENAME_TYPE
                    type: OBJECT_SQL_CHARACTER_TYPE
                    text: "varchar"
                    children:
                      - key: SQL_CHARACTER_TYPE
                        type: ENUM_SQL_CHARACTER_TYPE
                        value: VARCHAR
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []

