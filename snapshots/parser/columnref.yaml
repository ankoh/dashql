parser-snapshots:

  - name: columnref_simple
    input: |-
      select a
    expected:
      statements:
        - type: SELECT
          ast-begin: 0
          ast-size: 6
          ast:
            type: OBJECT_SQL_SELECT
            text: "select a"
            children:
              - key: SQL_SELECT_TARGETS
                type: ARRAY
                text: "a"
                children:
                  - type: OBJECT_SQL_RESULT_TARGET
                    text: "a"
                    children:
                      - key: SQL_RESULT_TARGET_VALUE
                        type: OBJECT_SQL_COLUMN_REF
                        text: "a"
                        children:
                          - key: SQL_COLUMN_REF_PATH
                            type: ARRAY
                            text: "a"
                            children:
                              - type: NAME
                                text: "a"
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []

  - name: columnref_plus
    input: |-
      select a + 1
    expected:
      statements:
        - type: SELECT
          ast-begin: 0
          ast-size: 10
          ast:
            type: OBJECT_SQL_SELECT
            text: "select a + 1"
            children:
              - key: SQL_SELECT_TARGETS
                type: ARRAY
                text: "a + 1"
                children:
                  - type: OBJECT_SQL_RESULT_TARGET
                    text: "a + 1"
                    children:
                      - key: SQL_RESULT_TARGET_VALUE
                        type: OBJECT_SQL_NARY_EXPRESSION
                        text: "a + 1"
                        children:
                          - key: SQL_EXPRESSION_OPERATOR
                            type: ENUM_SQL_EXPRESSION_OPERATOR
                            value: PLUS
                          - key: SQL_EXPRESSION_ARGS
                            type: ARRAY
                            text: "a + 1"
                            children:
                              - type: OBJECT_SQL_COLUMN_REF
                                text: "a"
                                children:
                                  - key: SQL_COLUMN_REF_PATH
                                    type: ARRAY
                                    text: "a"
                                    children:
                                      - type: NAME
                                        text: "a"
                              - type: LITERAL_INTEGER
                                text: "1"
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []
