          ast-size: 12
          ast:
            type: OBJECT_SQL_SELECT
            text: "select `sc..a`.`table`"
            children:
              - key: SQL_SELECT_TARGETS
                type: ARRAY
                text: "`schema`.`table`"
                children:
                  - type: OBJECT_SQL_RESULT_TARGET
                    text: "`schema`.`table`"
                    children:
                      - key: SQL_RESULT_TARGET_VALUE
                        type: OBJECT_SQL_COLUMN_REF
                        text: "`schema`.`table`"
                        children:
                          - key: SQL_COLUMN_REF_PATH
                            type: ARRAY
                            text: "`schema`.`table`"
                            children:
                              - type: NAME
                                text: "`schema`"
                              - type: NAME
                                text: "`table`"
              - key: SQL_SELECT_FROM
                type: ARRAY
                text: "from `sche..a`.`table`"
                children:
                  - type: OBJECT_SQL_TABLEREF
                    text: "`schema`.`table`"
                    children:
                      - key: SQL_TABLEREF_NAME
                        type: ARRAY
                        text: "`schema`.`table`"
                        children:
                          - type: NAME
                            text: "`schema`"
                          - type: NAME
                            text: "`table`"
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []

