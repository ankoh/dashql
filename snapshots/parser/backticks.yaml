parser-snapshots:

  - name: backtick_column_alias
    input: |-
      select 1 as `one`
    expected:
      statements:
        - type: SELECT
          ast-begin: 0
          ast-size: 5
          ast:
            type: OBJECT_SQL_SELECT
            text: "select 1 as `one`"
            children:
              - key: SQL_SELECT_TARGETS
                type: ARRAY
                text: "1 as `one`"
                children:
                  - type: OBJECT_SQL_RESULT_TARGET
                    text: "1 as `one`"
                    children:
                      - key: SQL_RESULT_TARGET_VALUE
                        type: LITERAL_INTEGER
                        text: "1"
                      - key: SQL_RESULT_TARGET_NAME
                        type: NAME
                        text: "`one`"
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []

  - name: backtick_table_alias
    input: |-
      select * from foo as `bar`
    expected:
      statements:
        - type: SELECT
          ast-begin: 0
          ast-size: 9
          ast:
            type: OBJECT_SQL_SELECT
            text: "select * f..o as `bar`"
            children:
              - key: SQL_SELECT_TARGETS
                type: ARRAY
                text: "*"
                children:
                  - type: OBJECT_SQL_RESULT_TARGET
                    text: "*"
                    children:
                      - key: SQL_RESULT_TARGET_STAR
                        type: BOOL
                        value: 1
              - key: SQL_SELECT_FROM
                type: ARRAY
                text: "from foo as `bar`"
                children:
                  - type: OBJECT_SQL_TABLEREF
                    text: "foo as `bar`"
                    children:
                      - key: SQL_TABLEREF_NAME
                        type: ARRAY
                        text: "foo"
                        children:
                          - type: NAME
                            text: "foo"
                      - key: SQL_TABLEREF_ALIAS
                        type: NAME
                        text: "`bar`"
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []

