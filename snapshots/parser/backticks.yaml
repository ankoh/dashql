                        value: 1
              - key: SQL_SELECT_FROM
                type: ARRAY
                text: "from `my_table`"
                children:
                  - type: OBJECT_SQL_TABLEREF
                    text: "`my_table`"
                    children:
                      - key: SQL_TABLEREF_NAME
                        type: ARRAY
                        text: "`my_table`"
                        children:
                          - type: NAME
                            text: "`my_table`"
      scanner-errors: []
      parser-errors: []
      line-breaks: []
      comments: []

  - name: backtick_qualified_name
    input: |-
      select `schema`.`table` from `schema`.`table`
