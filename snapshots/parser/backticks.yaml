  - name: backtick_cast_alias
    input: |-
      SELECT CAST('1' AS INTEGER) AS `1` FROM (
        SELECT CAST('true' AS BOOLEAN) AS `table_2_const_1`
      ) AS `table_2`
    expected:
      statements:
        - type: SELECT
          ast-begin: 0
          ast-size: 23
          ast:
            type: OBJECT_SQL_SELECT
            text: "SELECT CAS.. `table_2`"
            children:
              - key: SQL_SELECT_TARGETS
                type: ARRAY
                text: "CAST('1' A..ER) AS `1`"
                children:
                  - type: OBJECT_SQL_RESULT_TARGET
                    text: "CAST('1' A..ER) AS `1`"
                    children:
                      - key: SQL_RESULT_TARGET_VALUE
                        type: OBJECT_SQL_FUNCTION_EXPRESSION
                        text: "CAST('1' A..S INTEGER)"
                        children:
                          - key: SQL_FUNCTION_NAME
                            type: ENUM_SQL_KNOWN_FUNCTION
                            value: CAST
                          - key: SQL_FUNCTION_CAST_ARGS
                            type: OBJECT_SQL_FUNCTION_CAST_ARGS
                            text: "('1' AS INTEGER)"
                            children:
                              - key: SQL_FUNCTION_CAST_VALUE
                                type: LITERAL_STRING
                                text: "'1'"
                              - key: SQL_FUNCTION_CAST_TYPE
                                type: OBJECT_SQL_TYPENAME
                                text: "INTEGER"
                                children:
                                  - key: SQL_TYPENAME_TYPE
                                    type: ENUM_SQL_NUMERIC_TYPE
                                    value: INT4
                      - key: SQL_RESULT_TARGET_NAME
                        type: NAME
                        text: "`1`"
              - key: SQL_SELECT_FROM
                type: ARRAY
                text: "FROM (\n  S.. `table_2`"
                children:
                  - type: OBJECT_SQL_TABLEREF
                    text: "(\n  SELECT.. `table_2`"
                    children:
                      - key: SQL_TABLEREF_ALIAS
                        type: NAME
                        text: "`table_2`"
                      - key: SQL_TABLEREF_TABLE
                        type: OBJECT_SQL_SELECT
                        text: "(\n  SELECT..const_1`\n)"
                        children:
                          - key: SQL_SELECT_TARGETS
                            type: ARRAY
                            text: "CAST('true..2_const_1`"
                            children:
                              - type: OBJECT_SQL_RESULT_TARGET
                                text: "CAST('true..2_const_1`"
                                children:
                                  - key: SQL_RESULT_TARGET_VALUE
                                    type: OBJECT_SQL_FUNCTION_EXPRESSION
                                    text: "CAST('true..S BOOLEAN)"
                                    children:
                                      - key: SQL_FUNCTION_NAME
                                        type: ENUM_SQL_KNOWN_FUNCTION
                                        value: CAST
                                      - key: SQL_FUNCTION_CAST_ARGS
                                        type: OBJECT_SQL_FUNCTION_CAST_ARGS
                                        text: "('true' AS BOOLEAN)"
                                        children:
                                          - key: SQL_FUNCTION_CAST_VALUE
                                            type: LITERAL_STRING
                                            text: "'true'"
                                          - key: SQL_FUNCTION_CAST_TYPE
                                            type: OBJECT_SQL_TYPENAME
                                            text: "BOOLEAN"
                                            children:
                                              - key: SQL_TYPENAME_TYPE
                                                type: ENUM_SQL_NUMERIC_TYPE
                                                value: BOOL
                                  - key: SQL_RESULT_TARGET_NAME
                                    type: NAME
                                    text: "`table_2_const_1`"
      scanner-errors: []
      parser-errors: []
      line-breaks:
        - text: [41,42]
        - text: [95,96]
      comments: []
