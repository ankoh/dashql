completion-snapshots:
  # Keyword completion: "vis" resolves to visualise/visualize
  - name: vis_keyword_prefix
    catalog: {}
    editor:
      input: vis
    cursor:
      search:
        text: vis
        index: 3
    completions:
      limit: 3

  # Completion after VISUALIZE keyword (table source)
  - name: vis_after_keyword
    catalog:
      script:
        input: create table sales(revenue int, region text);
    editor:
      input: visualize sal
    cursor:
      search:
        text: sal
        index: 3
    completions:
      limit: 3

  # Renderer completion: `vegalite` is a grammar keyword, so it completes after USING.
  - name: vis_renderer_prefix
    catalog:
      script:
        input: create table sales(revenue int, region text);
    editor:
      input: visualize sales using veg
    cursor:
      search:
        text: veg
        index: 3
    completions:
      limit: 3

  # Renderer completion: the sole `vegalite` keyword surfaces right after USING.
  - name: vis_renderer_after_using
    catalog:
      script:
        input: create table sales(revenue int, region text);
    editor:
      input: 'visualize sales using '
    cursor:
      search:
        text: 'using '
        index: 6
    completions:
      limit: 3

