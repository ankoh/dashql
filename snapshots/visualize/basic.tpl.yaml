visualize-snapshots:
  - name: vis_bar_basic
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales AS (mark => bar);

  - name: vis_encoding_field_type
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales AS (
          mark => bar,
          encoding => (
            x => (field => category, type => nominal)
          )
        );

  - name: vis_encoding_two_channels
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales AS (
          mark => line,
          encoding => (
            x => (field => date, type => temporal),
            y => (field => revenue, type => quantitative)
          )
        );

  - name: vis_encoding_with_scale
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales AS (
          mark => point,
          encoding => (
            x => (field => revenue, type => quantitative, scale => (type => log, zero => false))
          )
        );

  - name: vis_encoding_with_axis
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales AS (
          mark => bar,
          encoding => (
            x => (field => category, type => nominal, axis => (label_angle => -45))
          )
        );

  - name: vis_encoding_color
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales AS (
          mark => bar,
          encoding => (
            x => (field => category, type => nominal),
            y => (field => revenue, type => quantitative),
            color => (field => category, type => nominal)
          )
        );

  - name: vis_shorthand_encoding
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales AS (
          mark => line,
          encoding => (
            x => date,
            y => revenue
          )
        );

  - name: vis_select_source
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE (SELECT category, revenue FROM sales) AS (
          mark => bar,
          encoding => (
            x => (field => category, type => nominal),
            y => (field => revenue, type => quantitative)
          )
        );

  - name: vis_no_source
    script:
      input: |
        VISUALIZE AS (
          mark => line,
          encoding => (
            x => (field => date, type => temporal)
          )
        );

  - name: vis_aggregate
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales AS (
          mark => bar,
          encoding => (
            x => (field => category, type => nominal),
            y => (field => revenue, type => quantitative, aggregate => sum)
          )
        );

  - name: vis_bin
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales AS (
          mark => bar,
          encoding => (
            x => (field => revenue, type => quantitative, bin => true),
            y => (field => category, type => nominal)
          )
        );

  - name: vis_width_height
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales AS (
          mark => bar,
          width => 800,
          height => 400
        );
