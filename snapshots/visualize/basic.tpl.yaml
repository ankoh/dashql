visualize-snapshots:
  - name: vis_bar_basic
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (mark => bar);

  - name: vis_mark_def_simple
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (
          mark => (type => bar, filled => true, opacity => 0.8)
        );

  - name: vis_mark_def_point_toggle
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (
          mark => (type => line, point => true)
        );

  - name: vis_mark_def_nested_overlay
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (
          mark => (type => line, point => (filled => false, fill => 'white'))
        );

  - name: vis_mark_def_broad
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (
          mark => (
            type => area,
            line => (stroke => 'red', stroke_width => 2),
            point => false,
            color => 'steelblue',
            stroke_dash => [4, 2],
            interpolate => 'monotone',
            tension => 0.5,
            tooltip => true
          )
        );

  - name: vis_encoding_field_type
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (
          mark => bar,
          encoding => (
            x => (field => category, type => nominal)
          )
        );

  - name: vis_encoding_two_channels
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (
          mark => line,
          encoding => (
            x => (field => date, type => temporal),
            y => (field => revenue, type => quantitative)
          )
        );

  - name: vis_encoding_with_scale
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (
          mark => point,
          encoding => (
            x => (field => revenue, type => quantitative, scale => (type => log, zero => false))
          )
        );

  - name: vis_encoding_with_axis
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (
          mark => bar,
          encoding => (
            x => (field => category, type => nominal, axis => (label_angle => -45))
          )
        );

  - name: vis_encoding_color
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (
          mark => bar,
          encoding => (
            x => (field => category, type => nominal),
            y => (field => revenue, type => quantitative),
            color => (field => category, type => nominal)
          )
        );

  - name: vis_shorthand_encoding
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (
          mark => line,
          encoding => (
            x => date,
            y => revenue
          )
        );

  - name: vis_select_source
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE (SELECT category, revenue FROM sales) USING vegalite (
          mark => bar,
          encoding => (
            x => (field => category, type => nominal),
            y => (field => revenue, type => quantitative)
          )
        );

  - name: vis_no_source
    script:
      input: |
        VISUALIZE USING vegalite (
          mark => line,
          encoding => (
            x => (field => date, type => temporal)
          )
        );

  - name: vis_aggregate
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (
          mark => bar,
          encoding => (
            x => (field => category, type => nominal),
            y => (field => revenue, type => quantitative, aggregate => sum)
          )
        );

  - name: vis_bin
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (
          mark => bar,
          encoding => (
            x => (field => revenue, type => quantitative, bin => true),
            y => (field => category, type => nominal)
          )
        );

  - name: vis_width_height
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
    script:
      input: |
        VISUALIZE sales USING vegalite (
          mark => bar,
          width => 800,
          height => 400
        );

  - name: vis_ea_minimal
    catalog:
      script:
        input: |-
          create table embeddings (id int, embedding float[], cluster_id int, name text);
    script:
      input: |
        VISUALIZE embeddings USING embeddingatlas (
          vector => embedding
        );

  - name: vis_ea_category_label
    catalog:
      script:
        input: |-
          create table embeddings (id int, embedding float[], cluster_id int, name text);
    script:
      input: |
        VISUALIZE embeddings USING embeddingatlas (
          vector => embedding,
          category => cluster_id,
          label => name
        );

  - name: vis_ea_projection
    catalog:
      script:
        input: |-
          create table embeddings (id int, embedding float[], cluster_id int, name text);
    script:
      input: |
        VISUALIZE embeddings USING embeddingatlas (
          vector => embedding,
          category => cluster_id,
          project => (
            method => umap,
            neighbors => 15,
            min_dist => 0.1,
            metric => cosine
          )
        );

  - name: vis_ea_select_source
    catalog:
      script:
        input: |-
          create table embeddings (id int, embedding float[], cluster_id int, name text);
    script:
      input: |
        VISUALIZE (SELECT embedding, cluster_id FROM embeddings) USING embeddingatlas (
          vector => embedding,
          category => cluster_id
        );
