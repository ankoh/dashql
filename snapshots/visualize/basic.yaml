visualize-snapshots:

  - name: vis_bar_basic
    catalog:
      script:
        input: |-
          create table sales (category text, revenue int, date timestamp);
        catalog-id: 1
        tables:
          - catalog-id: "256.65536.4294967296"
            name: sales
            text: "create tab..timestamp)"
            columns:
              - catalog-id: "256.65536.4294967296.0"
                name: category
                text: "category text"
              - catalog-id: "256.65536.4294967296.1"
                name: date
                text: "date timestamp"
              - catalog-id: "256.65536.4294967296.2"
                name: revenue
                text: "revenue int"
        errors: []
    script:
      input: |
        VISUALIZE sales AS (mark => bar);
    vegalite: |-
      {
        "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
        "data": {
          "name": "sales"
        },
        "mark": "bar"
      }
    roundtrip: |-
      VISUALIZE sales AS (
        mark => bar
      );

