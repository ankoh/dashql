name: 'Setup Bazel'
description: 'Setup Bazel with trusted CI defaults'

inputs:
  bazel-mtls-ca:
    description: 'Base64-encoded CA certificate (PEM) for verifying the cache server'
    required: true
  bazel-mtls-client-cert:
    description: 'Base64-encoded client certificate (PEM) for mTLS authentication'
    required: true
  bazel-mtls-client-key:
    description: 'Base64-encoded client private key (PEM) for mTLS authentication'
    required: true

runs:
  using: "composite"
  steps:
    - name: Write mTLS certificates
      shell: bash
      run: |
        mkdir -p "${{ runner.temp }}/bazel-mtls"
        chmod 700 "${{ runner.temp }}/bazel-mtls"
        echo "${{ inputs.bazel-mtls-ca }}" | base64 -d > "${{ runner.temp }}/bazel-mtls/ca.crt"
        echo "${{ inputs.bazel-mtls-client-cert }}" | base64 -d > "${{ runner.temp }}/bazel-mtls/client.crt"
        echo "${{ inputs.bazel-mtls-client-key }}" | base64 -d > "${{ runner.temp }}/bazel-mtls/client.key"
        chmod 600 "${{ runner.temp }}/bazel-mtls/ca.crt"
        chmod 600 "${{ runner.temp }}/bazel-mtls/client.crt"
        chmod 600 "${{ runner.temp }}/bazel-mtls/client.key"

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.18.0
      with:
        bazelisk-cache: true
        repository-cache: true
        bazelrc: |
          common --remote_cache=grpcs://bazel-cache.dashql.app:9092
          common --remote_timeout=10m
          common --tls_certificate=${{ runner.temp }}/bazel-mtls/ca.crt
          common --tls_client_certificate=${{ runner.temp }}/bazel-mtls/client.crt
          common --tls_client_key=${{ runner.temp }}/bazel-mtls/client.key
          build --build_metadata=REPO_URL=https://github.com/${{ github.repository }}
          build --build_metadata=COMMIT_SHA=${{ github.sha }}
          build --build_metadata=BRANCH_NAME=${{ github.ref_name }}
          build --remote_cache_compression=true
          build --remote_retries=5
          build --remote_download_outputs=toplevel
          build --noslim_profile
          build --experimental_profile_include_target_label
          build --experimental_profile_include_primary_output
