name: Tag

on:
    push:
        tags:
            - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
    build:
        name: Build
        uses: ./.github/workflows/build_trusted.yml
        with:
            commit: ${{ github.sha }}
            signed: true
        secrets: inherit

    publish:
        name: Publish
        uses: ./.github/workflows/publish.yml
        with:
            commit: ${{ github.sha }}
        needs:
            - build
        secrets: inherit
        permissions:
            contents: read
            pages: write
            id-token: write
