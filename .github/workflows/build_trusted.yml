name: Build

on:
    workflow_call:
        inputs:
            commit:
                required: true
                type: string
            signed:
                required: false
                type: boolean
                default: false

jobs:
    core_wasm_fastbuild:
        name: Core Wasm Fastbuild
        runs-on: ubuntu-24.04
        steps:
            - name: Install apt dependencies
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y lld

            - uses: actions/checkout@v6
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: ./.github/actions/setup-bazel
              with:
                  bazel-mtls-ca: ${{ secrets.BAZEL_CACHE_MTLS_CA }}
                  bazel-mtls-client-cert: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_CERT }}
                  bazel-mtls-client-key: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_KEY }}

            - name: Build WASM
              shell: bash
              run: |
                bazel build --config=fastbuild \
                    //packages/dashql-core:core_wasm

    core_wasm_release:
        name: Core Wasm Release
        runs-on: ubuntu-24.04
        steps:
            - name: Install apt dependencies
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y lld

            - uses: actions/checkout@v6
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: ./.github/actions/setup-bazel
              with:
                  bazel-mtls-ca: ${{ secrets.BAZEL_CACHE_MTLS_CA }}
                  bazel-mtls-client-cert: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_CERT }}
                  bazel-mtls-client-key: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_KEY }}

            - name: Build WASM
              shell: bash
              run: |
                bazel build --config=release \
                    //packages/dashql-core:core_wasm

    webdb_wasm_fastbuild:
        name: WebDB Wasm Fastbuild
        runs-on: ubuntu-24.04
        steps:
            - name: Install apt dependencies
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y lld

            - uses: actions/checkout@v6
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: ./.github/actions/setup-bazel
              with:
                  bazel-mtls-ca: ${{ secrets.BAZEL_CACHE_MTLS_CA }}
                  bazel-mtls-client-cert: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_CERT }}
                  bazel-mtls-client-key: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_KEY }}

            - name: Build WASM
              shell: bash
              run: |
                bazel build --config=fastbuild \
                    //packages/dashql-webdb:webdb_wasm

    webdb_wasm_release:
        name: WebDB Wasm Release
        runs-on: ubuntu-24.04
        steps:
            - name: Install apt dependencies
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y lld

            - uses: actions/checkout@v6
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: ./.github/actions/setup-bazel
              with:
                  bazel-mtls-ca: ${{ secrets.BAZEL_CACHE_MTLS_CA }}
                  bazel-mtls-client-cert: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_CERT }}
                  bazel-mtls-client-key: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_KEY }}

            - name: Build WASM
              shell: bash
              run: |
                bazel build --config=release \
                    //packages/dashql-webdb:webdb_wasm

    linux_fastbuild:
        name: Linux Fastbuild
        runs-on: ubuntu-24.04
        needs: [core_wasm_fastbuild, webdb_wasm_fastbuild]
        steps:
            - name: Install apt dependencies
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    lld \
                    pkg-config \
                    libglib2.0-dev \
                    libgtk-3-dev \
                    libwebkit2gtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev

            - uses: actions/checkout@v6
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: ./.github/actions/setup-bazel
              with:
                  bazel-mtls-ca: ${{ secrets.BAZEL_CACHE_MTLS_CA }}
                  bazel-mtls-client-cert: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_CERT }}
                  bazel-mtls-client-key: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_KEY }}

            - name: Assert WASM is in remote cache
              shell: bash
              run: |
                bazel build --config=fastbuild \
                    --experimental_remote_require_cached \
                    //packages/dashql-core:core_wasm \
                    //packages/dashql-webdb:webdb_wasm

            - name: Build Everything
              shell: bash
              run: |
                bazel build --config=fastbuild \
                    //packages/...

            - name: Test Everything
              shell: bash
              run: |
                bazel test --config=fastbuild //packages/... \
                    --build_tests_only \
                    --test_output=errors \
                    --test_summary=detailed

    linux_release:
        name: Linux Release
        runs-on: ubuntu-24.04
        needs: [core_wasm_release, webdb_wasm_release]
        steps:
            - name: Install apt dependencies
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    lld \
                    pkg-config \
                    libglib2.0-dev \
                    libgtk-3-dev \
                    libwebkit2gtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev

            - uses: actions/checkout@v6
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: ./.github/actions/setup-bazel
              with:
                  bazel-mtls-ca: ${{ secrets.BAZEL_CACHE_MTLS_CA }}
                  bazel-mtls-client-cert: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_CERT }}
                  bazel-mtls-client-key: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_KEY }}

            - name: Assert WASM is in remote cache
              shell: bash
              run: |
                bazel build --config=release \
                    --experimental_remote_require_cached \
                    //packages/dashql-core:core_wasm \
                    //packages/dashql-webdb:webdb_wasm

            - name: Build Web App
              shell: bash
              run: |
                bazel build --config=release \
                    //packages/...

            - name: Test Web App
              shell: bash
              run: |
                bazel test --config=release //packages/... \
                    --build_tests_only \
                    --test_output=errors \
                    --test_summary=detailed

            - uses: actions/upload-artifact@v7
              with:
                name: dashql_app_pages
                path: ./bazel-bin/packages/dashql-app/pages/
                retention-days: 1

    macos_aarch64:
        name: MacOS Release Arm
        runs-on: macos-15
        needs: [core_wasm_release, webdb_wasm_release]
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: ./.github/actions/setup-bazel
              with:
                  bazel-mtls-ca: ${{ secrets.BAZEL_CACHE_MTLS_CA }}
                  bazel-mtls-client-cert: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_CERT }}
                  bazel-mtls-client-key: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_KEY }}

            - name: Assert WASM is in remote cache
              shell: bash
              run: |
                bazel build --config=release \
                    --experimental_remote_require_cached \
                    //packages/dashql-core:core_wasm \
                    //packages/dashql-webdb:webdb_wasm

            - name: Build aarch64
              shell: bash
              run: |
                bazel build --config=release \
                    --platforms=//bazel/platforms:aarch64_macos \
                    //packages/dashql-native:mac_app_aarch64 \
                    //packages/dashql-native:tests

            - name: Test Desktop App
              shell: bash
              run: |
                bazel test --config=release \
                    --platforms=//bazel/platforms:aarch64_macos \
                    //packages/dashql-native/... \
                    --build_tests_only \
                    --test_output=errors \
                    --test_summary=detailed

    macos_x86_64:
        name: MacOS Release x86
        runs-on: macos-15
        needs: [core_wasm_release, webdb_wasm_release]
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: ./.github/actions/setup-bazel
              with:
                  bazel-mtls-ca: ${{ secrets.BAZEL_CACHE_MTLS_CA }}
                  bazel-mtls-client-cert: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_CERT }}
                  bazel-mtls-client-key: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_KEY }}

            - name: Assert WASM is in remote cache
              shell: bash
              run: |
                bazel build --config=release \
                    --experimental_remote_require_cached \
                    //packages/dashql-core:core_wasm \
                    //packages/dashql-webdb:webdb_wasm

            - name: Build x86_64
              shell: bash
              run: |
                bazel build --config=release \
                    //packages/dashql-native:mac_app_x86_64

    macos_universal_unsigned:
        name: MacOS Release Universal Unsigned
        if: ${{ !inputs.signed }}
        runs-on: macos-15
        needs: [macos_aarch64, macos_x86_64]
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: ./.github/actions/setup-bazel
              with:
                  bazel-mtls-ca: ${{ secrets.BAZEL_CACHE_MTLS_CA }}
                  bazel-mtls-client-cert: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_CERT }}
                  bazel-mtls-client-key: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_KEY }}

            - name: Assert arch binaries are in remote cache
              shell: bash
              run: |
                bazel build --config=release \
                    --experimental_remote_require_cached \
                    //packages/dashql-native:mac_app_aarch64 \
                    //packages/dashql-native:mac_app_x86_64

            - name: Build unsigned Desktop App
              shell: bash
              run: |
                bazel build --config=release \
                    //packages/dashql-native:mac_universal_app_bundle \
                    //packages/dashql-native:mac_universal_dmg

            - name: Upload unsigned DMG
              uses: actions/upload-artifact@v7
              with:
                name: dashql_macos_dmg
                path: ./bazel-bin/packages/dashql-native/DashQL-universal.dmg
                retention-days: 1

    macos_universal_signed:
        name: MacOS Release Universal Signed
        if: ${{ inputs.signed }}
        runs-on: macos-15
        needs: [macos_aarch64, macos_x86_64]
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: ./.github/actions/setup-bazel
              with:
                  bazel-mtls-ca: ${{ secrets.BAZEL_CACHE_MTLS_CA }}
                  bazel-mtls-client-cert: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_CERT }}
                  bazel-mtls-client-key: ${{ secrets.BAZEL_CACHE_MTLS_CLIENT_KEY }}

            - name: Assert arch binaries are in remote cache
              shell: bash
              run: |
                bazel build --config=release \
                    --experimental_remote_require_cached \
                    //packages/dashql-native:mac_app_aarch64 \
                    //packages/dashql-native:mac_app_x86_64

            - name: Build Desktop App
              shell: bash
              run: |
                bazel build --config=release \
                    //packages/dashql-native:mac_universal_app_bundle

            - name: Sign Desktop App
              uses: ./.github/actions/sign-macos
              with:
                signing-identity: ${{ secrets.MACOS_SIGNING_IDENTITY }}
                certificate-base64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_BASE64 }}
                certificate-password: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_SECRET }}
                notarytool-issuer: ${{ secrets.MACOS_STORE_ISSUER_ID }}
                notarytool-key-id: ${{ secrets.MACOS_STORE_KEY_ID }}
                notarytool-key: ${{ secrets.MACOS_STORE_KEY }}
                updater-signing-key: ${{ secrets.RELEASE_SIGNING_KEY_BASE64 }}
                updater-signing-key-password: ${{ secrets.RELEASE_SIGNING_KEY_PASSWORD }}

            - name: Upload signed DMG
              uses: actions/upload-artifact@v7
              with:
                name: dashql_macos_dmg_signed
                path: ${{ runner.temp }}/DashQL-universal-signed.dmg
                retention-days: 7

            - name: Upload updater bundle
              uses: actions/upload-artifact@v7
              with:
                name: dashql_macos_updater_signed
                path: |
                    ./bazel-bin/packages/dashql-native/DashQL-universal-signed.app.tar.gz
                    ./bazel-bin/packages/dashql-native/DashQL-universal-signed.app.tar.gz.sig
                retention-days: 7
