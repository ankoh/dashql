name: 'Self-Hosted'
on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master

jobs:
    clang_format:
        name: Clang-Format
        runs-on: self-hosted
        steps:
            - uses: actions/checkout@v3

            - name: Prepare repository
              uses: ./actions/image
              with:
                  script: |-
                      git submodule update --init --recursive
                      ./scripts/generate_proto.sh

            - name: Lint ./lib
              uses: ./actions/image
              with:
                  script: |-
                      python3 ./scripts/run_clang_format.py \
                        --exclude ./lib/build \
                        --exclude ./lib/third_party \
                        -r ./lib/

    eslint:
        name: ESLint
        runs-on: self-hosted
        steps:
            - uses: actions/checkout@v3

            - name: Prepare repository
              uses: ./actions/image
              with:
                  script: |-
                      git submodule update --init --recursive
                      yarn install --frozen-lockfile
                      ./scripts/generate_proto.sh

            - name: Lint @dashql/core
              uses: ./actions/image
              with:
                  script: |-
                      yarn workspace @dashql/core run lint

    linux_x86_debug:
        name: Linux / x86 / Debug
        runs-on: self-hosted
        needs:
            - clang_format
            - eslint
        steps:
            - uses: actions/checkout@v3

            - name: Prepare repository
              uses: ./actions/image
              with:
                  script: |-
                      git submodule update --init --recursive
                      mkdir -p ./lib/build/debug ./reports

            - name: Compile flatbuffer schema
              uses: ./actions/image
              with:
                  script: |-
                      ./scripts/generate_proto.sh

            - name: Build
              uses: ./actions/image
              with:
                  script: |-
                      cmake \
                          -S./lib/ \
                          -B./lib/build/debug \
                          -DCODE_COVERAGE=1 \
                          -DCMAKE_BUILD_TYPE=Debug \
                          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                          -DCMAKE_C_COMPILER=clang \
                          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                          -DCMAKE_CXX_COMPILER=clang++ \
                          -DCMAKE_BUILD_TYPE=Debug
                      ccache -s
                      make -C./lib/build/debug -j`nproc`
                      ccache -s

            - name: Test
              uses: ./actions/image
              with:
                  script: |-
                      export LLVM_PROFILE_FILE=./reports/lib.profraw
                      ./lib/build/debug/tester \
                          --source_dir=./lib/ \
                          --gtest_output=xml:./reports/tests_lib_debug.xml

            - name: Code Coverage
              uses: ./actions/image
              with:
                  script: |-
                      llvm-profdata merge \
                          -sparse ./reports/lib.profraw \
                          -o ./reports/lib.profdata
                      llvm-cov show ./lib/build/debug/tester \
                          --instr-profile ./reports/lib.profdata \
                          -ignore-filename-regex submodules \
                          > ./reports/coverage_lib.txt

            - uses: codecov/codecov-action@v2.1.0
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./reports/coverage_lib.txt
                  flags: unittests

    linux_x86_release:
        name: Linux / x86 / Release
        runs-on: self-hosted
        needs:
            - clang_format
            - eslint
        steps:
            - uses: actions/checkout@v3

            - name: Prepare repository
              uses: ./actions/image
              with:
                  script: |-
                      git submodule update --init --recursive
                      mkdir -p ./lib/build/release ./reports

            - name: Compile flatbuffer schema
              uses: ./actions/image
              with:
                  script: |-
                      ./scripts/generate_proto.sh

            - name: Build
              uses: ./actions/image
              with:
                  script: |-
                      cmake \
                          -S./lib/ \
                          -B./lib/build/release \
                          -DCMAKE_BUILD_TYPE=Release \
                          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                          -DCMAKE_C_COMPILER=clang \
                          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                          -DCMAKE_CXX_COMPILER=clang++ \
                          -DCMAKE_BUILD_TYPE=Release
                      ccache -s
                      make -C./lib/build/release -j`nproc`
                      ccache -s

            - name: Test
              uses: ./actions/image
              with:
                  script: |-
                      ./lib/build/release/tester \
                          --source_dir=./lib/ \
                          --gtest_output=xml:./reports/tests_lib_release.xml

    app:
        name: App
        runs-on: self-hosted
        needs:
            - linux_x86_debug
            - linux_x86_release

        steps:
            - uses: actions/checkout@v3

            - name: Prepare repository
              uses: ./actions/image
              with:
                  script: |-
                      git submodule update --init --recursive
                      mkdir -p ./lib/build/wasm/release ./reports
                      yarn install --frozen-lockfile

            - name: Compile flatbuffer schema
              uses: ./actions/image
              with:
                  script: |-
                      ./scripts/generate_proto.sh
                      yarn workspace @dashql/proto build

            - name: Build WASM module
              uses: ./actions/image
              with:
                  script: |-
                      emcmake cmake \
                          -S./lib/ \
                          -B./lib/build/wasm/release \
                          -DCMAKE_BUILD_TYPE=Release \
                          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                          -DBOOST_ARCHIVE=/opt/boost.tar.gz

                      ccache -s

                      emmake make \
                          -C./lib/build/wasm/release \
                          -j`nproc` \
                          analyzer_wasm jmespath_wasm

                      ccache -s

                      cp ./lib/build/wasm/release/analyzer_*.{wasm,js} ./packages/core/src/analyzer/
                      cp ./lib/build/wasm/release/jmespath_*.{wasm,js} ./packages/core/src/jmespath/

            - name: Build app
              uses: ./actions/image
              with:
                  script: |-
                      yarn workspace @dashql/core build:app:prod

            - name: Test app
              uses: ./actions/image
              with:
                  script: |-
                      node --experimental-vm-modules --liftoff --no-wasm-tier-up ./node_modules/.bin/jest --collect-coverage

            - uses: codecov/codecov-action@v2.1.0
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage/coverage-final.json
                  flags: unittests

            - name: Build GitHub Pages
              if: github.ref == 'refs/heads/master'
              run: |
                  git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY
                  git fetch origin gh-pages
                  ./scripts/deploy_app.sh
