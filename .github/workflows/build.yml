name: Build

on:
    workflow_call:
        inputs:
            commit:
                required: true
                type: string
            signed:
                required: false
                type: boolean
                default: false

jobs:
    linux_debug:
        name: Linux / Release
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v5
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: bazel-contrib/setup-bazel@v0.18.0
              with:
                  bazelisk-cache: true
                  disk-cache: true
                  repository-cache: true

            - name: Setup protoc
              uses: ./.github/actions/setup-protoc
              with:
                os: ubuntu-24.04

            - name: Build DashQL
              shell: bash
              run: |
                  bazel build \
                    //packages/dashql-pack:pack \
                    //packages/dashql-compute:dist \
                    //packages/dashql-core:core_wasm \
                    //packages/dashql-core:test_main \
                    //packages/dashql-app:pages \
                    //packages/dashql-app:reloc \
                    //packages/dashql-native:app

            - name: Test DashQL
              shell: bash
              run: bazel test //...


    linux_release:
        name: Linux / Release
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v5
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: bazel-contrib/setup-bazel@v0.18.0
              with:
                  bazelisk-cache: true
                  disk-cache: true
                  repository-cache: true

            - name: Setup protoc
              uses: ./.github/actions/setup-protoc
              with:
                os: ubuntu-24.04

            - name: Build Bazel release outputs
              shell: bash
              run: |
                  bazel build --config=release \
                    //packages/dashql-pack:pack \
                    //packages/dashql-compute:dist \
                    //packages/dashql-core:core_wasm \
                    //packages/dashql-core:test_main \
                    //packages/dashql-app:pages \
                    //packages/dashql-app:reloc \
                    //packages/dashql-native:app

            - name: Test DashQL
              shell: bash
              run: bazel test --config=release //...


