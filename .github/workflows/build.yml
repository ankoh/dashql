name: Build

on:
    workflow_call:
        inputs:
            commit:
                required: true
                type: string
            signed:
                required: false
                type: boolean
                default: false

jobs:
    build:
        name: ${{ matrix.job_name }}
        runs-on: ${{ matrix.runs_on }}
        strategy:
            matrix:
                include:
                    - job_name: Linux Debug
                      runs_on: ubuntu-24.04
                      bazel_flags: ""
                      cache_key: "linux_debug"
                    - job_name: Linux Release
                      runs_on: ubuntu-24.04
                      bazel_flags: "--config=release"
                      cache_key: "linux_release"
        steps:
            - name: Install apt dependencies
              if: startsWith(matrix.runs_on, 'ubuntu')
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    lld \
                    pkg-config \
                    libglib2.0-dev \
                    libgtk-3-dev \
                    libwebkit2gtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev

            - uses: actions/checkout@v5
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: bazel-contrib/setup-bazel@0.18.0
              with:
                  bazelisk-cache: true
                  repository-cache: true
                  disk-cache: ${{ github.workflow }}/${{ matrix.cache_key }}

            - name: Build DashQL
              shell: bash
              run: bazel build ${{ matrix.bazel_flags }} //packages/...

            - name: Test DashQL
              shell: bash
              run: bazel test ${{ matrix.bazel_flags }} //packages/... --build_tests_only --test_output=errors --test_summary=detailed
