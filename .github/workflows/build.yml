name: Build

on:
    workflow_call:
        inputs:
            commit:
                required: true
                type: string
            signed:
                required: false
                type: boolean
                default: false

jobs:
    linux_fastbuild:
        name: Linux Fastbuild
        runs-on: ubuntu-24.04
        steps:
            - name: Install apt dependencies
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    lld \
                    pkg-config \
                    libglib2.0-dev \
                    libgtk-3-dev \
                    libwebkit2gtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev

            - uses: actions/checkout@v5
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: bazel-contrib/setup-bazel@0.18.0
              with:
                  bazelisk-cache: true
                  repository-cache: true
                  disk-cache: ${{ github.workflow }}/linux_fastbuild

            - name: Build DashQL
              shell: bash
              run: |
                bazel build --config=fastbuild //packages/...

            - name: Test DashQL
              shell: bash
              run: |
                bazel test --config=fastbuild //packages/... \
                    --build_tests_only \
                    --test_output=errors \
                    --test_summary=detailed

    linux_release:
        name: Linux Release
        runs-on: ubuntu-24.04
        steps:
            - name: Install apt dependencies
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    lld \
                    pkg-config \
                    libglib2.0-dev \
                    libgtk-3-dev \
                    libwebkit2gtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev

            - uses: actions/checkout@v5
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: bazel-contrib/setup-bazel@0.18.0
              with:
                  bazelisk-cache: true
                  repository-cache: true
                  disk-cache: ${{ github.workflow }}/linux_release

            - name: Build Web App
              shell: bash
              run: |
                bazel build --config=release \
                    //packages/dashql-app:pages

            - name: Test Web App
              shell: bash
              run: |
                bazel test --config=release \
                    //packages/dashql-app/...

            - uses: actions/upload-artifact@v4
              with:
                name: dashql_app_pages
                path: ./bazel-bin/packages/dashql-app/pages/
                retention-days: 1

    macos_release:
        name: MacOS Release
        runs-on: macos-14
        steps:
            - uses: actions/checkout@v5
              with:
                  submodules: 'recursive'
                  fetch-depth: 0
                  ref: ${{ inputs.commit || github.sha }}

            - name: Setup Bazel
              uses: bazel-contrib/setup-bazel@0.18.0
              with:
                  bazelisk-cache: true
                  repository-cache: true
                  disk-cache: ${{ github.workflow }}/macos_release

            - name: Build Desktop App
              shell: bash
              run: |
                bazel build --config=release \
                    //packages/dashql-native:mac_universal_dmg

            - name: Test Desktop App
              shell: bash
              run: |
                bazel test //packages/dashql-native/... \
                    --build_tests_only \
                    --test_output=errors \
                    --test_summary=detailed

            - uses: actions/upload-artifact@v4
              with:
                name: dashql_app_macos_universal
                path: ./bazel-bin/packages/dashql-native/DashQL-universal.dmg
                retention-days: 1
