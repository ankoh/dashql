on: [push, pull_request]

jobs:

  build_app:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v2
    - name: Prepare repository
      run: |
        git submodule update --init --recursive
        mkdir -p ./core/cpp/build/emscripten ./reports
        make reset_duckdb

    - uses: ./actions/ci_image
      with:
        script: |
          cmake \
              -S./core/cpp/ \
              -B./core/cpp/build/debug \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DCMAKE_BUILD_TYPE=Debug
          ccache -s
          make -C./core/cpp/build/debug -j`nproc`
          ccache -s'

