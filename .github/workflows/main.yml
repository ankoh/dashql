on: [push, pull_request]

jobs:
  build:
    name: Build
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v2
    - name: Prepare repository
      run: |
        git submodule update --init --recursive
        mkdir -p ./core/cpp/build/emscripten ./reports

    - name: Native / Build
      uses: ./ci/image
      with:
        script: |-
          make reset_duckdb
          cmake \
              -S./core/cpp/ \
              -B./core/cpp/build/debug \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DCMAKE_BUILD_TYPE=Debug
          ccache -s
          make -C./core/cpp/build/debug -j`nproc`
          ccache -s

    - name: Native / Test
      uses: ./ci/image
      with:
        script: |-
            ./core/cpp/build/debug/grammar_tests ./core/cpp/test/grammar \
                --gtest_output=xml:./reports/tests_native_grammar.xml

    - name: WASM / Build
      uses: ./ci/image
      with:
        script: |-
            emcmake cmake \
                -S./core/cpp/ \
                -B./core/cpp/build/emscripten \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

            emmake make \
                -C./core/cpp/build/emscripten \
                -j`nproc` \
                dashql_core_web dashql_core_node duckdb_web duckdb_node

            cp ./core/cpp/build/emscripten/*.wasm ./core/js/src/wasm/
            cp ./core/cpp/build/emscripten/*.js ./core/js/src/wasm/
            cp ./core/cpp/build/emscripten/duckdb/*.wasm ./duckdb/js/src/wasm/
            cp ./core/cpp/build/emscripten/duckdb/*.js ./duckdb/js/src/wasm/

    - name: JS / Core / Build
      uses: ./ci/image
      with:
        script: |-
            cd ./core/js
            nvm use default
            npm ci --cache /home/actions/.npm_cache
            npm run build

    - name: JS / Core / Test
      uses: ./ci/image
      with:
        script: |-
            cd ./core/js
            nvm use default
            npm run test:ci

    - name: JS / DuckDB / Build
      uses: ./ci/image
      with:
        script: |-
            cd ./duckdb/js
            nvm use default
            npm ci --cache /home/actions/.npm_cache
            npm run build

    - name: JS / DuckDB / Test
      uses: ./ci/image
      with:
        script: |-
            cd ./duckdb/js
            nvm use default
            npm run test:ci

    - name: App/Build
      uses: ./ci/image
      with:
        script: |-
            cd ./app
            nvm use default
            npm ci --cache /home/actions/.npm_cache
            npm run build:release
