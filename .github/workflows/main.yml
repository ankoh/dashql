on: [push, pull_request]

jobs:

  build_app:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v2
    - name: Prepare repository
      run: |
        git submodule update --init --recursive
        mkdir -p ./core/cpp/build/emscripten ./reports

    - name: Native / Build
      uses: ./ci/image
      with:
        script: |-
          make reset_duckdb
          cmake \
              -S./core/cpp/ \
              -B./core/cpp/build/debug \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DCMAKE_BUILD_TYPE=Debug
          ccache -s
          make -C./core/cpp/build/debug -j`nproc`
          ccache -s

    - name: Native / Test
      uses: ./ci/image
      with:
        script: |-
            ./core/cpp/build/debug/grammar_tests ./core/cpp/test/grammar \
                --gtest_output=xml:./reports/tests_native_grammar.xml
