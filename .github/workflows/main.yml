on: [push, pull_request]

env:
    CI_IMAGE_NAME: dashql/dashql-ci
    CI_IMAGE_TAG: ${{ github.sha }}

jobs:

  build-image:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v2
    - name: Build CI image
      run: |
        docker build \
          -f ./scripts/Dockerfile.dev \
          -t ${CI_IMAGE_NAME}/${CI_IMAGE_TAG} \
          --build-arg EMSDK_VERSION=2.0.4 \
          --build-arg NODE_VERSION=v14.13.0 \
          .

