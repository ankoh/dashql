[package]
name = "cors-proxy"
version = "0.0.2-dev.17"
description = "Simple CORS proxy for local development"
edition = "2021"
rust-version = "1.70"
publish = false

[dependencies]
anyhow = "1.0.102"
bytes = "1.11.1"
http = "1.4.0"
http-body-util = "0.1.3"
log = "0.4.29"
env_logger = "0.11.10"

[dependencies.clap]
version = "4.6.1"
features = ["derive"]

[dependencies.hyper]
version = "1.9.0"
features = ["server", "http1"]

[dependencies.hyper-util]
version = "0.1.20"
features = ["server", "tokio"]

[dependencies.tokio]
version = "1.52.1"
features = ["rt-multi-thread", "macros", "net", "io-util"]

[dependencies.reqwest]
version = "0.13.2"
default-features = false
features = ["stream", "native-tls", "charset", "http2", "system-proxy"]
