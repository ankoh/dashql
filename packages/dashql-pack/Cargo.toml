[package]
name = "dashql-pack"
version = "0.0.2-dev.17"
description = "Packaging tool for get.dashql.app"
edition = "2021"
rust-version = "1.70"

[dev-dependencies]
tauri-build = "2.6.1"
tauri-plugin-updater = "2.10.1"

[dependencies]
futures = "0.3.32"
chrono = "0.4.44"
anyhow = "1.0.102"
semver = "1.0.28"
aws-sdk-s3 = { version = "1.131.0", default-features = false, features = ["sigv4a", "http-1x", "rustls", "rt-tokio"] }
aws-credential-types = "1.2.14"
log = "0.4.29"
env_logger = "0.11.10"
git2 = "0.20.4"
regex = "1.12.3"
lazy_static = "1.5.0"
minisign = "0.9.1"

[dependencies.serde]
version = "1.0.228"
features = ["derive"]

[dependencies.serde_json]
version = "1.0.149"
features = ["preserve_order"]

[dependencies.serde_with]
version = "3.19.0"
features = ["json"]

[dependencies.aws-config]
version = "1.8.16"
default-features = false
features = ["rt-tokio"]

[dependencies.tokio]
version = "1.52.1"
features = ["full"]

[dependencies.clap]
version = "4.6.1"
features = ["derive"]

[dependencies.uuid]
version = "1.23.1"
features = ["v5"]

[dependencies.toml]
version = "1.1.2"
features = ["preserve_order"]

