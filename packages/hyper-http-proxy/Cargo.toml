[package]
name = "hyper-http-proxy"
version = "0.0.2-dev.17"
description = "Standalone proxy that speaks the Salesforce Hyper Database HTTP v3 API and forwards to the Hyper gRPC API."
edition = "2021"
rust-version = "1.70"
publish = false

[build-dependencies.tonic-prost-build]
version = "0.14.6"

[dependencies]
anyhow = "1.0.102"
bytes = "1.11.1"
http = "1.4.0"
http-body-util = "0.1.3"
log = "0.4.30"
env_logger = "0.11.10"
prost = "^0.14.3"
serde_json = "1.0.150"
futures-util = "0.3.32"
reqwest = { version = "^0.13.3", default-features = false, features = ["native-tls", "http2", "charset", "stream"] }

[dependencies.uuid]
version = "1.23.1"
features = ["v4"]

[dependencies.serde]
version = "1.0.228"
features = ["derive"]

[dependencies.clap]
version = "4.6.1"
features = ["derive"]

[dependencies.hyper]
version = "1.10.1"
features = ["server", "http1"]

[dependencies.hyper-util]
version = "0.1.20"
features = ["server", "tokio"]

[dependencies.tokio]
version = "^1.52.3"
features = ["rt-multi-thread", "macros", "net", "io-util", "sync", "time"]

[dependencies.tonic]
version = "^0.14.6"
features = ["tls-ring", "tls-native-roots"]

[dependencies.tonic-prost]
version = "0.14.6"

[dev-dependencies]
tokio-stream = { version = "0.1.18", features = ["net"] }
# Dev-only: re-declare reqwest to enable the `json` feature for integration tests.
reqwest = { version = "^0.13.3", default-features = false, features = ["native-tls", "http2", "charset", "stream", "json"] }
