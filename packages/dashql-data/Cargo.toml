[package]
name = "dashql-data"
version = "0.0.1"
description = "Build-artifact indexer + R2 mirror for data.dashql.app"
edition = "2021"
rust-version = "1.70"

[[bin]]
name = "dashql-data"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.104"
log = "0.4.33"
env_logger = "0.11.11"
walkdir = "2.5.0"
sha2 = "0.10.9"
aws-sdk-s3 = { version = "1.134.0", default-features = false, features = ["sigv4a", "http-1x", "rustls", "rt-tokio"] }
aws-credential-types = "1.2.14"

[dependencies.aws-config]
version = "1.8.18"
default-features = false
features = ["rt-tokio"]

[dependencies.tokio]
version = "1.52.3"
features = ["full"]

[dependencies.clap]
version = "4.6.1"
features = ["derive"]

[dependencies.serde]
version = "1.0.228"
features = ["derive"]

[dependencies.serde_json]
version = "1.0.150"
features = ["preserve_order"]
