[package]
name = "umap-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "WASM bindings for UMAP and NNDescent"

[lib]
crate-type = ["cdylib", "rlib"]

# The `gpu` feature forwards to umap/nndescent's wgpu → WebGPU path. Default so
# crate_universe resolves the wgpu/bytemuck aliases (see nndescent/Cargo.toml). The Bazel
# cdylib sets crate_features = ["gpu"] explicitly and depends on the +gpu library variants.
[features]
default = ["gpu"]
gpu = ["nndescent/gpu", "umap/gpu"]

[dependencies]
nndescent = { path = "../nndescent" }
umap = { path = "../umap" }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = "0.4"
js-sys = { workspace = true }
ndarray = { workspace = true }
getrandom = { workspace = true, features = ["wasm_js"] }

[lints]
workspace = true
