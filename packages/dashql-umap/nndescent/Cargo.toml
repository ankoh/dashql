[package]
name = "nndescent"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Rust port of PyNNDescent - fast approximate nearest neighbor search"

# The `gpu` feature enables wgpu → WebGPU acceleration (gpu.rs / nn_descent_gpu.rs +
# WGSL shaders). It's a DEFAULT feature so crate_universe resolves wgpu/bytemuck into
# @umap_crates (optional-only deps get no Bazel alias otherwise). The native Bazel test
# targets stay CPU-only regardless: they pin crate_features per-target in BUILD.bazel.
[features]
default = ["gpu"]
gpu = ["wgpu", "bytemuck"]

[dependencies]
ndarray = { workspace = true, features = ["rayon"] }
rayon = { workspace = true }
ordered-float = "5.2"
getrandom = { workspace = true }
wide = "1.2.0"
pollster = { workspace = true }
wgpu = { workspace = true, optional = true }
bytemuck = { workspace = true, optional = true }

[lints]
workspace = true
