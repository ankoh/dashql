[package]
name = "umap"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "UMAP - Uniform Manifold Approximation and Projection for Dimension Reduction"

# The `gpu` feature enables wgpu → WebGPU acceleration (gpu_optimize.rs + optimize.wgsl)
# and forwards to nndescent/gpu. Default so crate_universe resolves wgpu/bytemuck aliases
# (see nndescent/Cargo.toml); native Bazel test targets stay CPU-only via crate_features.
[features]
default = ["gpu"]
gpu = ["nndescent/gpu", "wgpu", "bytemuck"]

[dependencies]
nndescent = { path = "../nndescent" }
ndarray = { workspace = true, features = ["rayon"] }
rayon = { workspace = true }
pollster = { workspace = true }
wgpu = { workspace = true, optional = true }
bytemuck = { workspace = true, optional = true }

[lints]
workspace = true
