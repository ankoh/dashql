# Vendored UMAP + NNDescent crates from Apple's embedding-atlas (MIT), compiled to
# wasm32-unknown-unknown for the `VISUALIZE ... USING embeddingatlas` renderer.
#
# The upstream `gpu` (wgpu → WebGPU) feature is vendored in: gpu.rs / nn_descent_gpu.rs /
# gpu_optimize.rs plus the WGSL shaders accelerate the kNN and layout phases when the host
# exposes WebGPU, and fall back to the CPU path otherwise. See //NOTICE for attribution.
# This is a SEPARATE workspace from the root //:Cargo.toml so its wasm-only deps
# (wasm-bindgen, js-sys, getrandom/wasm_js, wgpu) never enter the native `crates` universe.
#
# Repin after editing any member manifest: CARGO_BAZEL_REPIN=1 bazel build @umap_crates//:all
[workspace]
resolver = "2"
members = ["nndescent", "umap", "umap-wasm"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/apple/embedding-atlas"
authors = ["Apple Inc."]

[workspace.dependencies]
ndarray = "0.17"
rayon = "1.11"
pollster = "0.4"
wasm-bindgen = "=0.2.105"
js-sys = "0.3.69"
getrandom = "0.4"
wgpu = "24"
bytemuck = { version = "1", features = ["derive"] }

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }

# NOTE: Bazel drives optimization via compilation_mode + wasm-opt, not this profile.
# Kept only for out-of-tree `cargo build` parity and Cargo.lock generation.
[profile.release]
strip = true
lto = true
opt-level = "s"
