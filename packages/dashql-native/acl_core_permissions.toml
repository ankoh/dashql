# Core Tauri plugin commands — mirrors the PLUGINS constant in tauri's build.rs.
# Currently tracks tauri 2.10.3.
#
# HOW TO UPDATE (when upgrading the tauri crate version):
#
# 1. Find the new tauri version's build.rs in the crate source, e.g.:
#      ~/.cargo/registry/src/.../tauri-<version>/build.rs
#    or browse it on crates.io / GitHub at tauri-apps/tauri (crates/tauri/build.rs).
#
# 2. Locate the PLUGINS constant (a static array of PluginModule structs).
#    Each entry has a `name` ("core:xxx") and a `commands` list of (name, default) pairs.
#
# 3. Diff the PLUGINS array against the [[module]] blocks below:
#    - Add any new modules or commands that appeared in the new version.
#    - Remove any modules or commands that were dropped.
#    - Update `default` flags if they changed.
#
# 4. Update the version number in the comment on line 2 above.
#
# 5. Run `bazel build //packages/dashql-native:tauri_acl` to verify the
#    generated ACL JSON is accepted by the build without errors.
#
# FORMAT: each [[module]] has:
#   name     — "core:<plugin>" matching the PLUGINS entry exactly
#   commands — list of { name = "<cmd>", default = <bool> }
#              default = true  → command is included in the plugin's "default" permission set
#              default = false → command must be explicitly allowed in a capability

[[module]]
name = "core:path"
commands = [
    { name = "resolve_directory", default = true },
    { name = "resolve", default = true },
    { name = "normalize", default = true },
    { name = "join", default = true },
    { name = "dirname", default = true },
    { name = "extname", default = true },
    { name = "basename", default = true },
    { name = "is_absolute", default = true },
]

