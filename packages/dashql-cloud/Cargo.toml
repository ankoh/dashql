# dashql-cloud — Cloudflare Worker (workers-rs) for the dashql service: an OpenAI-compatible
# SLM gateway (ai.dashql.app) plus the account dashboard (account.dashql.app).
#
# This crate is INTENTIONALLY isolated from the repo's root Cargo workspace:
#  * the root Cargo.toml uses an explicit `members` list (not a glob), and this crate is not on it;
#  * the empty [workspace] table below makes this an isolated workspace root, so Cargo never
#    attaches it to the parent and Bazel's crate_universe (which consumes the root workspace)
#    never ingests it. See docs/wip/account.md.
[workspace]

[package]
name = "dashql-cloud"
version = "0.1.0"
edition = "2021"
authors = ["dashql"]
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
worker = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Pure-Rust crypto (no `ring`, so it compiles to wasm32-unknown-unknown):
rsa = "0.9"
# `oid` feature provides Sha256: AssociatedOid, required by pkcs1v15::VerifyingKey::<Sha256>::new
# (the DigestInfo-prefixed variant used for JWT RS256 verification).
sha2 = { version = "0.10", features = ["oid"] }
hmac = "0.12"
base64 = "0.22.1"
# WASM randomness for API-key generation. `getrandom`'s `js` feature routes to Web Crypto.
getrandom = { version = "0.2", features = ["js"] }
hex = "0.4.3"
# AI Gateway routing: `worker` 0.8's `Ai::run` binding has no third `options` argument (where
# `{ gateway }` lives), so `ai.rs` re-declares the JS `Ai.run` method via `#[wasm_bindgen]`. All
# three crates are already in the tree transitively via `worker`; declaring them directly just lets
# our FFI shim name them. Versions kept loose so Cargo unifies to whatever `worker` resolves.
wasm-bindgen = "0.2"
js-sys = "0.3"
serde-wasm-bindgen = "0.6.5"

[profile.release]
# Keep the WASM bundle small (Workers enforces a compressed-size limit).
opt-level = "s"
lto = true
# NOTE: do NOT set `strip = true` here. Stripping removes the wasm `target_features` custom
# section, which wasm-bindgen 0.2.126 reads to detect that reference-types/multivalue are
# enabled; without it the build fails with "externref table required for catch wrappers"
# (see wasm-bindgen PR #5205). worker-build's `wasm-opt` pass strips the binary anyway.
codegen-units = 1
