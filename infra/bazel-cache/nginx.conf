events {
    worker_connections 1024;
}

http {
    # --------------------------------------------------------
    # 1. HTTPS Server (Port 443 -> BuildBuddy HTTP Port 8080)
    # --------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on; # Note: If using Nginx < 1.25.1, use 'listen 443 ssl http2;'

        server_name buildbuddy.dashql.app;

        # Standard Server TLS
        ssl_certificate /etc/nginx/mtls/dashql-cache-server.crt;
        ssl_certificate_key /etc/nginx/mtls/dashql-cache-server.key;

        # Enforce mTLS
        ssl_client_certificate /etc/nginx/mtls/dashql-cache-ca.crt;
        ssl_verify_client on; 

        location / {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass client certificate details to BuildBuddy (optional)
            proxy_set_header X-Client-Verify $ssl_client_verify;
            proxy_set_header X-Client-DN $ssl_client_s_dn;
        }
    }

    # --------------------------------------------------------
    # 2. gRPCs Server (Port 1986 -> BuildBuddy gRPC Port 1985)
    # --------------------------------------------------------
    server {
        listen 1986 ssl;
        http2 on; # REQUIRED for gRPC

        server_name buildbuddy.dashql.app;

        # Standard Server TLS
        ssl_certificate /etc/nginx/mtls/dashql-cache-server.crt;
        ssl_certificate_key /etc/nginx/mtls/dashql-cache-server.key;

        # Enforce mTLS
        ssl_client_certificate /etc/nginx/mtls/dashql-cache-ca.crt;
        ssl_verify_client on; 

        # Allow large uploads for Bazel artifacts
        client_max_body_size 0;

        location / {
            grpc_pass grpc://app:1985;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
