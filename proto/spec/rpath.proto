syntax = "proto3";

option optimize_for = LITE_RUNTIME;
option cc_enable_arenas = true;

package tigon.proto.rpath;

message ArraySlice {}
message ArrayIndexes {}
message ChildMember {}
message DescendantMember {}

message Component {
    oneof component {
        ArraySlice arraySlice = 1;
        ArrayIndexes arrayIndexes = 2;
        ChildMember childMember = 3;
        DescendantMember descendantMember = 4;
    }
}

message Path {
    repeated Component components = 1;
}
