[package]
name = "dashql_core"
version = "0.1.0"
edition = "2018"

[lib]
name = "dashql_core"
path = "src/lib.rs"
crate-type = ["lib"]
test = true
doctest = false

[[bin]]
name = "dashql_dump"
path = "src/bin/dump.rs"
test = false
doctest = false

[[bin]]
name = "dashql_dvms"
path = "src/bin/dvms.rs"
test = false
doctest = false

[dependencies]
dashql_proto = { path = "../dashql-proto" }
dashql_parser = { path = "../dashql-parser-sys" }
duckdbx_api = { path = "../duckdbx-api" }
async-trait = "0.1.56"
arrow = { version = "14.0.0", features = ['ipc'] }
getrandom = { version = "0.2.6", features = ['js'] }
futures = "0.3.21"
smallvec = "1.8.0"
bumpalo = "3.9.1"
flatbuffers = "2.1.1"
libc = "0.2.121"
serde_json = "1.0"
serde = { version = "1.0.136", features = ['derive'] }
quick-xml = { version = "0.22.0", features = ['serialize'] }
clap = "2.33.3"
log = "0.4.0"
env_logger = "0.8.3"
pretty_assertions = "1.2.1"
reqwest = "0.11.10"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1.19.2", features = ["rt", "macros"] }
