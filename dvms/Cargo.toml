[package]
name = "dashql"
version = "0.1.0"
edition = "2018"

[[bin]]
name = "dvms"
path = "src/dvms.rs"

[[bin]]
name = "dump_grammar"
path = "src/dump_grammar.rs"

[dependencies]
dashql_proto = { path = "../packages/proto" }
flatbuffers = "2.1.1"
libc = "0.2.121"
serde = { version = "1.0.136", features = ['derive'] }
quick-xml = { version = "0.22.0", features = ['serialize'] }

[build-dependencies]
cmake = "0.1.48"
